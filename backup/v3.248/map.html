<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="lib/maplibre-gl.js"></script>
<link href="lib/maplibre-gl.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#map{width:100%;height:100%;background:#fff;font-family:-apple-system,Helvetica,sans-serif}
.maplibregl-ctrl-attrib{display:none!important}
</style>
</head>
<body>
<div id="map"></div>
<script>
// ===================================================================
// LOG HELPER — invia log al pannello log integrato (ObjC)
// ===================================================================
function appLog(msg) {
  try { webkit.messageHandlers.appLog.postMessage(msg); } catch(e) {}
  console.log(msg);
}

// JS error catcher — invia errori al pannello log integrato
window.onerror = function(msg, url, line) {
  appLog("❌ JS ERR: " + msg + " (line " + line + ")");
  return true;
};
// ===================================================================
// CONFIG
// ===================================================================
const OSRM_URL = "https://router.project-osrm.org";
const NOMINATIM_URL = "https://nominatim.openstreetmap.org";

// ===================================================================
// STATO
// ===================================================================
var userLat = 44.49, userLng = 11.34, userCourse = 0;
var isNavigating = false;
var navRoute = null;           // GeoJSON route geometry
var navCoords = [];            // [lng, lat] array route coordinates
var navInstruction = "";
var navDistance = 0;
var navETA = 0;
var navSpeed = 0;
var markerArrow = null;
var markerDest = null;
var navTimer = null;
var hasGps = false;
var _destLat = null, _destLon = null, _destName = "";
var recalcLat = userLat, recalcLng = userLng;
var _routeSteps = []; // OSRM steps: {name, cumDist}
var _navCoordOffset = 0; // offset assoluto per lookup nome via
var _totalRouteDist = 0; // distanza totale del percorso in metri
var _routingProfile = "driving"; // default auto, cambia con setRoutingProfile

// ===================================================================
// MAPLIBRE GL JS — con stile OpenFreeMap
// ===================================================================
var map = null;
try {
  map = new maplibregl.Map({
    container: "map",
    style: "https://tiles.openfreemap.org/styles/liberty",
    center: [11.34, 44.49],
    zoom: 14,
    pitch: 50,
    bearing: 0,
    maxPitch: 85,
    attributionControl: false
  });
  // Bussola nativa MapLibre GL
  map.addControl(new maplibregl.NavigationControl({showCompass: true, showZoom: false}), 'bottom-left');
  
  // === LAYER POSIZIONE UTENTE (pallino blu, sempre visibile) ===
  // Questo layer mostra la posizione GPS su tutta la mappa, senza navigazione
  map.addSource('user-location', {
    type: 'geojson',
    data: { type: 'Feature', geometry: { type: 'Point', coordinates: [11.34, 44.49] } }
  });
  map.addLayer({
    id: 'user-location-layer',
    type: 'circle',
    source: 'user-location',
    paint: {
      'circle-radius': 8,
      'circle-color': '#4488ff',
      'circle-stroke-width': 3,
      'circle-stroke-color': '#ffffff',
      'circle-opacity': 0.9
    }
  });
  // Layer anello esterno (pulsazione per GPS attivo)
  map.addLayer({
    id: 'user-location-ring',
    type: 'circle',
    source: 'user-location',
    paint: {
      'circle-radius': 14,
      'circle-color': 'rgba(68, 136, 255, 0.2)',
      'circle-stroke-width': 0
    }
  });
} catch(e) {
  appLog("❌ MapLibre init error: " + (e.message || e));
}

// Hide buildings when style loads
if (map) {
  map.on("style.load", function() {
    try { if (map.getLayer("building")) map.setLayoutProperty("building", "visibility", "none"); } catch(e) {}
    try { if (map.getLayer("building_outline")) map.setLayoutProperty("building_outline", "visibility", "none"); } catch(e) {}
    appLog("✓ Stile map caricato (OpenFreeMap liberty)");
  });
  // Riposiziona freccia CSS quando camera si muove
  map.on("move", function() {
    if (markerArrow && userLat && userLng) {
      var pt = map.project([userLng, userLat]);
      var rot = (userCourse > 0) ? " rotate(" + userCourse + "deg)" : "";
      markerArrow.style.transform = "translate(-50%,-50%) translate(" + pt.x.toFixed(1) + "px," + pt.y.toFixed(1) + "px)" + rot;
    }
  });
}

// ===================================================================
// FUNZIONI CHIAMATE DA OBJC (via evaluateJavaScript)
// ===================================================================

// ---- POSITION (CSS arrow a posizione fissa sullo schermo) ----
var markerArrow = null;
var _arrowScreenY = 0.35; // 35% dall'alto = freccia in basso

function updatePosition(lat, lng) {
  userLat = lat; userLng = lng;
  recalcLat = lat; recalcLng = lng;
  if (!markerArrow) {
    var el = document.createElement("div");
    el.style.cssText = "width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:24px solid #4488ff;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5));position:absolute;left:50%;top:35%;pointer-events:none;z-index:10000;will-change:transform";
    var dot = document.createElement("div");
    dot.style.cssText = "position:absolute;top:4px;left:-4px;width:8px;height:8px;border-radius:50%;background:#fff;pointer-events:none";
    el.appendChild(dot);
    document.getElementById("map").appendChild(el);
    markerArrow = el;
  }
  var rot = (userCourse > 0) ? " rotate(" + userCourse + "deg)" : "";
  markerArrow.style.transform = "translate(-50%,-50%)" + rot;
  hasGps = true;
  
  // Aggiorna anche il pallino blu user-location (se presente)
  try {
    var src = map.getSource('user-location');
    if (src) src.setData({ type: 'Feature', geometry: { type: 'Point', coordinates: [lng, lat] } });
  } catch(e) {}
}

function updateArrowRotation(heading, cameraHeading, offset) {
  if (!markerArrow || !markerArrow.el) return;
  var angle = heading;
  if (cameraHeading) angle = angle - cameraHeading;
  angle += offset || 0;
  markerArrow.style.transform = markerArrow.style.transform.replace(/ rotate\([^)]+\)/, "") + " rotate(" + angle + "deg)";
}

function updateCompass(heading) {
  // Compass is handled natively in ObjC with compass.png
}

function centerOnUser() {
  if (hasGps) map.flyTo({center:[userLng, userLat], zoom:16, pitch:50, bearing:userCourse});
}

// ---- CAMERA ----
function setMapCenter(lat, lng, zoom) {
  map.flyTo({center:[lng, lat], zoom:zoom || 15, pitch:50, duration:300});
}

function setMapBearing(heading) {
  map.easeTo({bearing:heading, duration:300});
}

function setMapTilt(pitch) {
  map.easeTo({pitch:pitch, duration:300});
}

function animateCamera(lat, lng, zoom, bearing, pitch) {
  appLog("animateCamera: center=" + lat.toFixed(4)+","+lng.toFixed(4)+" zoom="+zoom.toFixed(1)+" bearing="+(bearing||0).toFixed(0));
  map.easeTo({center:[lng, lat], zoom:zoom, bearing:bearing || 0, pitch:pitch || 50, duration:16});
}

// ---- OBJC COMPATIBILITY ----
// pushPosition mantenuto per compatibilità ObjC
function pushPosition(lat, lng, bearing, ts) {
  userCourse = bearing || 0;
  updatePosition(lat, lng);
}

// NavEngine functions — no-op (CSS arrow mode, ObjC timers gestiscono tutto)
function startNavEngine() {}
function stopNavEngine() {}
function initNavEngine() {}

// ===================================================================
// SEARCH (Nominatim)
// ===================================================================
var _searchReqId = 0;
var _searchTimer = null;
var _lastSearchResults = [];
var _userCity = "Bologna";

function _getUserCity() {
  var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + userLat + '&lon=' + userLng + '&zoom=10';
  fetch(url, { headers: { 'User-Agent': 'aNavigator/3.40 (iOS)' } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d && d.address)
        _userCity = d.address.city || d.address.town || d.address.village || d.address.municipality || "Bologna";
    })
    .catch(function() {});
}
_getUserCity();

function _fmtDist(m) {
  if (m < 1000) return Math.round(m) + " m";
  return (m / 1000).toFixed(1) + " km";
}

function _parseOne(item) {
  try {
    var a = item.address || {};
    var strada = a.road || a.pedestrian || a.footway || a.street || a.suburb || "";
    var civico = a.house_number || "";
    var nome = strada;
    if (civico) nome += ", " + civico;
    if (!nome) nome = item.name || (item.display_name ? item.display_name.split(',')[0].trim() : "?");
    var citta = a.city || a.town || a.village || a.municipality || a.county || "";
    var dist = distance(userLat, userLng, parseFloat(item.lat), parseFloat(item.lon));
    if (isNaN(dist)) dist = 99999999;
    var sub = citta || a.state || "";
    if (sub) sub += " — " + _fmtDist(dist);
    else sub = _fmtDist(dist);
    return { displayName: nome, displaySubtitle: sub, name: nome, lat: parseFloat(item.lat), lon: parseFloat(item.lon), full: item.display_name || "", dist: dist, city: citta };
  } catch(e) { return null; }
}

function _fetchData(url) {
  return fetch(url, {
    headers: {
      'Accept': 'application/json',
      'User-Agent': 'aNavigator/3.40 (iOS; Italia)',
      'Accept-Language': 'it, en'
    }
  })
    .then(function(r) {
      if (!r.ok) { appLog("  ⚠️ HTTP " + r.status); return []; }
      return r.json();
    })
    .then(function(data) { return Array.isArray(data) ? data : []; })
    .catch(function() { return []; });
}

function _searchAndPost(query, reqId) {
  var url1 = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query)
    + '&limit=30&countrycodes=it&addressdetails=1&lat=' + userLat + '&lon=' + userLng;
  
  _fetchData(url1).then(function(data1) {
    if (reqId !== _searchReqId) return;
    var parsed1 = [];
    data1.forEach(function(item) { var p = _parseOne(item); if (p) parsed1.push(p); });
    
    if (!_userCity) {
      parsed1.sort(function(a, b) { return a.dist - b.dist; });
      _lastSearchResults = parsed1;
      try { webkit.messageHandlers.searchResults.postMessage(parsed1); } catch(e) {}
      return;
    }
    
    var url2 = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query + " " + _userCity)
      + '&limit=15&countrycodes=it&addressdetails=1&lat=' + userLat + '&lon=' + userLng;
    
    _fetchData(url2).then(function(data2) {
      if (reqId !== _searchReqId) return;
      var parsed2 = [];
      data2.forEach(function(item) { var p = _parseOne(item); if (p) parsed2.push(p); });
      
      var all = parsed1.concat(parsed2);
      var seen = {};
      var merged = [];
      for (var i = 0; i < all.length; i++) {
        var key = Math.round(all[i].lat * 1000) + "_" + Math.round(all[i].lon * 1000) + "_" + (all[i].name || "").substring(0, 30);
        if (seen[key]) continue;
        seen[key] = true;
        merged.push(all[i]);
      }
      merged.sort(function(a, b) { return a.dist - b.dist; });
      
      _lastSearchResults = merged;
      try { webkit.messageHandlers.searchResults.postMessage(merged); } catch(e) {}
    }).catch(function() {
      if (reqId === _searchReqId) {
        parsed1.sort(function(a, b) { return a.dist - b.dist; });
        _lastSearchResults = parsed1;
        try { webkit.messageHandlers.searchResults.postMessage(parsed1); } catch(e) {}
      }
    });
  }).catch(function() {
    if (reqId === _searchReqId && _lastSearchResults.length > 0)
      try { webkit.messageHandlers.searchResults.postMessage(_lastSearchResults); } catch(e) {}
  });
}

function nativeSearchOSM(query) {
  try {
    query = (query || "").trim();
    if (_searchTimer) { clearTimeout(_searchTimer); _searchTimer = null; }
    
    if (query.length < 2) {
      if (_lastSearchResults.length > 0)
        try { webkit.messageHandlers.searchResults.postMessage(_lastSearchResults); } catch(e) {}
      return;
    }
    
    _searchTimer = setTimeout(function() {
      _searchTimer = null;
      _searchAndPost(query, ++_searchReqId);
    }, 1500);
  } catch(e) {
    appLog("❌ Search error: " + e.message);
  }
}

function _ensureMapReady(callback) {
  if (map && map.loaded && map.loaded()) {
    callback();
    return;
  }
  appLog("⏳ Mappa non pronta, attendo...");
  map.once("style.load", function() {
    try { if (map.getLayer("building")) map.setLayoutProperty("building", "visibility", "none"); } catch(e) {}
    callback();
  });
  setTimeout(function() { callback(); }, 500);
}

function _waitMapAndAddRoute(geoJson, toLng, toLat) {
  _ensureMapReady(function() {
    clearRoute();
    try {
      map.addSource(_routeLayerId, {
        type: "geojson",
        data: {type: "Feature", geometry: geoJson}
      });
      map.addLayer({
        id: _routeLayerId,
        type: "line",
        source: _routeLayerId,
        layout: {"line-join": "round", "line-cap": "round"},
        paint: {"line-color": "#22cc44", "line-width": 6, "line-opacity": 0.9}
      });
      appLog("✅ Layer route aggiunto");
    } catch(e) {
      appLog("❌ Errore layer route: " + e.message);
    }
    
    try {
      if (markerDest) { markerDest.remove(); markerDest = null; }
    } catch(e) {}
    var el = document.createElement("div");
    el.style.cssText = "width:16px;height:16px;border-radius:50%;background:#e74c3c;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5)";
    markerDest = new maplibregl.Marker({element:el, anchor:"center"})
      .setLngLat([toLng, toLat])
      .addTo(map);
    appLog("✅ Marker destinazione aggiunto a " + toLng.toFixed(4) + "," + toLat.toFixed(4));
    
    try {
      var bounds = new maplibregl.LngLatBounds();
      geoJson.coordinates.forEach(function(c) { bounds.extend(c); });
      map.fitBounds(bounds, {padding:80, pitch:50, maxZoom:16});
      appLog("✅ fitBounds completato");
    } catch(e) {
      appLog("❌ Errore fit bounds: " + e.message);
    }
    
    try { webkit.messageHandlers.routeReady.postMessage("ok"); } catch(e) {}
  });
}

// ---- ROUTING (OSRM) ----
var _routeLayerId = "route-line-v2";

function clearRoute() {
  try { map.removeLayer(_routeLayerId); } catch(e) {}
  try { map.removeSource(_routeLayerId); } catch(e) {}
}

function setRoutingProfile(profile) {
  _routingProfile = profile || "driving";
  appLog("📡 Profilo routing: " + _routingProfile);
}

function calculateRoute(fromLat, fromLng, toLat, toLng, name) {
  _destLat = toLat; _destLon = toLng; _destName = name || "";
  _navCoordOffset = 0;
  clearRoute();
  clearDestination();
  
  appLog("🧭 Calcolo percorso: " + (fromLat.toFixed(4)) + "," + (fromLng.toFixed(4)) + " → " + (toLat.toFixed(4)) + "," + (toLng.toFixed(4)));
  
  var url = OSRM_URL + "/route/v1/" + _routingProfile + "/" + fromLng + "," + fromLat + ";" + toLng + "," + toLat + "?geometries=geojson&steps=true&overview=full";
  
  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); appLog("⏱️ OSRM timeout dopo 10s"); }, 10000);
  
  return fetch(url, {signal: controller.signal})
    .then(function(r) {
      clearTimeout(timeoutId);
      if (!r.ok) { appLog("⚠️ OSRM HTTP " + r.status); return null; }
      return r.json();
    })
    .then(function(data) {
      if (!data || !data.routes || data.routes.length === 0) {
        appLog("⚠️ Nessun percorso trovato");
        return null;
      }
      var route = data.routes[0];
      navRoute = route.geometry;
      navCoords = route.geometry.coordinates.slice();
      navDistance = route.distance;
      navETA = route.duration;
      _totalRouteDist = route.distance;
      
      // Estrai steps con nomi strade da OSRM (usa distanza cumulativa)
      _routeSteps = [];
      if (route.legs && route.legs[0] && route.legs[0].steps) {
        var cumDist = 0;
        for (var si = 0; si < route.legs[0].steps.length; si++) {
          var step = route.legs[0].steps[si];
          cumDist += step.distance || 0;
          _routeSteps.push({
            name: step.name || "",
            cumDist: cumDist  // distanza cumulativa alla fine di questo step
          });
        }
      }
      
      try {
        var simArr = [];
        for (var si = 0; si < navCoords.length; si++) {
          simArr.push({lat: navCoords[si][1], lon: navCoords[si][0]});
        }
        webkit.messageHandlers.simCoords.postMessage(JSON.stringify(simArr));
      } catch(e) {
        appLog("⚠️ simCoords postMessage error: " + e.message);
      }
      
      _waitMapAndAddRoute(route.geometry, toLng, toLat);
      
      return JSON.stringify({
        distance: route.distance,
        duration: route.duration,
        name: name || ""
      });
    })
    .catch(function(err) {
      appLog("❌ OSRM fetch error: " + (err.message || err));
      return null;
    });
}

function startNavigation() {
  isNavigating = true;
  hasGps = true;
  if (navTimer) clearInterval(navTimer);
  navTimer = setInterval(function() { navTick(); }, 1000);
}

function navTick() {
  if (!isNavigating || !hasGps) return;
  
  if (navCoords.length < 2) {
    endNavigation();
    return;
  }
  
  var closest = null, minDist = Infinity;
  for (var i = 0; i < navCoords.length; i++) {
    var d = distance(userLat, userLng, navCoords[i][1], navCoords[i][0]);
    if (d < minDist) { minDist = d; closest = i; }
  }
  
  // Salva closest per slice dopo
  if (closest > 3) {
    _navCoordOffset += closest;
    navCoords = navCoords.slice(closest);
  }
  
  var remaining = 0;
  for (var j = 1; j < navCoords.length; j++) {
    remaining += distance(navCoords[j-1][1], navCoords[j-1][0], navCoords[j][1], navCoords[j][0]);
  }
  
  var instruction = getInstruction(navCoords);
  var traveledDist = _totalRouteDist - remaining;
  var streetName = getCurrentStreetName(traveledDist);
  appLog("via: '" + streetName + "' (dist=" + Math.round(traveledDist) + "m, steps=" + _routeSteps.length + ")");
  
  if (navCoords.length < 2 && remaining < 30) {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.navigationEnd)
      window.webkit.messageHandlers.navigationEnd.postMessage("");
    return;
  }
  
  navDistance = remaining;
  
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.navUpdate) {
    var update = JSON.stringify({
      instruction: instruction,
      streetName: streetName,
      distance: remaining,
      eta: remaining / 13.9,
      speed: navSpeed,
      arrived: false
    });
    window.webkit.messageHandlers.navUpdate.postMessage(update);
  }
  
  if (minDist > 30 && navCoords.length > 2) {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.error)
      window.webkit.messageHandlers.error.postMessage("Fuori rotta, ricalcolo...");
  }
}

function getInstruction(coords) {
  if (coords.length < 3) return "Prosegui dritto";
  var b1 = bearing(coords[0][1], coords[0][0], coords[1][1], coords[1][0]);
  var b2 = bearing(coords[1][1], coords[1][0], coords[2][1], coords[2][0]);
  var turn = b2 - b1;
  if (turn > 180) turn -= 360;
  if (turn < -180) turn += 360;
  if (turn > 120 || turn < -120) return "Inversione a U";
  if (turn > 60) return "Svolta a destra";
  if (turn > 20) return "Leggermente a destra";
  if (turn < -60) return "Svolta a sinistra";
  if (turn < -20) return "Leggermente a sinistra";
  return "Prosegui dritto";
}

// Restituisce il nome della strada corrente basato sulla distanza percorsa lungo la route
function getCurrentStreetName(traveledDist) {
  for (var si = 0; si < _routeSteps.length; si++) {
    var step = _routeSteps[si];
    if (traveledDist <= step.cumDist) {
      return step.name || "";
    }
  }
  // Se la distanza supera tutti gli step, usa l'ultimo
  if (_routeSteps.length > 0) {
    return _routeSteps[_routeSteps.length - 1].name || "";
  }
  return "";
}

function endNavigation() {
  isNavigating = false;
  if (navTimer) { clearInterval(navTimer); navTimer = null; }
  clearRoute();
  clearDestination();
  stopNavEngine();
}

// ---- ROUTING (OSRM) — con gestione errori robusta ----
var _routeLayerId = "route-line";

function km(m) { return (m/1000).toFixed(1) + " km"; }

function clearRoute() {
  try { map.removeLayer(_routeLayerId); } catch(e) {}
  try { map.removeSource(_routeLayerId); } catch(e) {}
}

function clearDestination() {
  if (markerDest) { markerDest.remove(); markerDest = null; }
}

function recalculateRoute() {
  if (_destLat === null || _destLon === null) return;
  clearRoute();
  clearDestination();
  var url = OSRM_URL + "/route/v1/" + _routingProfile + "/" + recalcLng + "," + recalcLat + ";" + _destLon + "," + _destLat + "?geometries=geojson&steps=true&overview=full";
  return fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.routes || data.routes.length === 0) {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.error)
          window.webkit.messageHandlers.error.postMessage("Nessun percorso trovato");
        return null;
      }
      var route = data.routes[0];
      navRoute = route.geometry;
      navCoords = route.geometry.coordinates.slice();
      navDistance = route.distance;
      navETA = route.duration;
      map.addLayer({
        id: "route-line",
        type: "line",
        source: {type:"geojson",data:{type:"Feature",geometry:route.geometry}},
        paint: {"line-color":"#22cc44","line-width":6,"line-opacity":0.8}
      });
      var el = document.createElement("div");
      el.style.cssText = "width:16px;height:16px;border-radius:50%;background:#e74c3c;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5)";
      markerDest = new maplibregl.Marker({element:el,anchor:"center"})
        .setLngLat([_destLon, _destLat])
        .addTo(map);
      var bounds = new maplibregl.LngLatBounds();
      route.geometry.coordinates.forEach(function(c) { bounds.extend(c); });
      map.fitBounds(bounds, {padding:80, pitch:50});
      var result = JSON.stringify({distance:route.distance,duration:route.duration,name:_destName});
      return result;
    });
}

function snapToRoute(lat, lng) {
  if (!navCoords || navCoords.length < 2) return JSON.stringify({lat:lat, lon:lng});
  var closest = navCoords[0];
  var minDist = Infinity;
  for (var i = 0; i < navCoords.length; i++) {
    var d = distance(lat, lng, navCoords[i][1], navCoords[i][0]);
    if (d < minDist) { minDist = d; closest = navCoords[i]; }
  }
  return JSON.stringify({lat:closest[1], lon:closest[0]});
}

function coordinateAheadOnRoute(lat, lng, meters) {
  if (!navCoords || navCoords.length < 2) return JSON.stringify({lat:lat, lon:lng});
  var closest = 0, minDist = Infinity;
  for (var i = 0; i < navCoords.length; i++) {
    var d = distance(lat, lng, navCoords[i][1], navCoords[i][0]);
    if (d < minDist) { minDist = d; closest = i; }
  }
  var accumulated = 0;
  for (var j = closest + 1; j < navCoords.length; j++) {
    var seg = distance(navCoords[j-1][1], navCoords[j-1][0], navCoords[j][1], navCoords[j][0]);
    accumulated += seg;
    if (accumulated >= meters) {
      return JSON.stringify({lat:navCoords[j][1], lon:navCoords[j][0]});
    }
  }
  var last = navCoords[navCoords.length - 1];
  return JSON.stringify({lat:last[1], lon:last[0]});
}

function getRouteCoords() {
  if (!navCoords || navCoords.length === 0) return "[]";
  var result = [];
  for (var i = 0; i < navCoords.length; i++) {
    result.push({lat: navCoords[i][1], lon: navCoords[i][0]});
  }
  return JSON.stringify(result);
}

function sendSimCoords() {
  webkit.messageHandlers.simCoords.postMessage(getRouteCoords());
}

function getNavState() {
  return JSON.stringify({
    instruction: getInstruction(navCoords),
    distanceRemaining: navDistance,
    etaSeconds: navDistance / 13.9,
    speedKmh: navSpeed,
    arrived: navCoords.length < 2 && navDistance < 30
  });
}

}

function getMapBounds() {

  return JSON.stringify({

  });

var _gtfsDB = null;

var _busNavData = null;
var _busOsrmCoords = null;

function loadGtfsDatabase(jsonStr) {

function loadGtfsDatabaseBase64(b64) {

// GTFS DB verrà caricato da ObjC via evaluateJavaScript dopo il page load

function _fmtService(services) {
  // servizi unici, ordinati
  var uniq = [];
  for (var si = 0; si < services.length; si++) {
    var s = services[si];
    if (s && uniq.indexOf(s) === -1) uniq.push(s);
  }
  if (uniq.length === 0) return "";
  if (uniq.length === 1) return " · " + uniq[0];
  // Regola: se c'è Feriale mostra solo Feriale (include weekend)
  if (uniq.indexOf("Feriale") !== -1) return " · Feriale";
  // Sabato e Domenica
  return " · " + uniq.join(" e ");
}

var _busSearchReqId = 0;
var _busSearchTimer = null;

function nativeSearchBusLine(query) {
  try {
    query = (query || "").trim().toUpperCase();
    if (query.length < 1) return;
    
    // Cancella timer pendente
    if (_busSearchTimer) { clearTimeout(_busSearchTimer); _busSearchTimer = null; }
    
    // Se GTFS non caricato, richiedi e riprova
    if (!_gtfsDB) {
      try { webkit.messageHandlers.requestGtfs.postMessage(""); } catch(e) {}
      appLog("⏳ GTFS DB non ancora caricato, richiedo...");
      _busSearchTimer = setTimeout(function() { nativeSearchBusLine(query); }, 500);
      return;
    }
    
    var reqId = ++_busSearchReqId;
    var results = [];
    var keys = Object.keys(_gtfsDB.lines);
    
    // Ogni iterazione è protetta — se un singolo trip crasha, gli altri funzionano
    for (var ki = 0; ki < keys.length; ki++) {
      if (reqId !== _busSearchReqId) return; // stale check
      try {
        var ln = keys[ki];
        if (ln.indexOf(query) !== 0) continue; // SOLO prefix match
        
        var line = _gtfsDB.lines[ln];
        if (!line || !line.trips || line.trips.length === 0) continue;
        
        // Raccogli servizi unici
        var allServices = [];
        for (var ti = 0; ti < line.trips.length; ti++) {
          try {
            var s = line.trips[ti].service || "";
            if (s && allServices.indexOf(s) === -1) allServices.push(s);
          } catch(ee) {}
        }
        var serviceLabel = _fmtService(allServices);
        
        // Primo valido con dir=0, fallback al primo trip
        var firstTrip = null;
        for (var ti = 0; ti < line.trips.length; ti++) {
          try {
            if (line.trips[ti].dir === 0 && line.trips[ti].stops && line.trips[ti].stops.length > 0) {
              firstTrip = line.trips[ti]; break;
            }
          } catch(ee) {}
        }
        if (!firstTrip) {
          for (var ti = 0; ti < line.trips.length; ti++) {
            try {
              if (line.trips[ti].stops && line.trips[ti].stops.length > 0) {
                firstTrip = line.trips[ti]; break;
              }
            } catch(ee) {}
          }
        }
        if (!firstTrip) continue;
        
        var fs = firstTrip.stops[0];
        if (!fs || fs.lat === undefined || fs.lon === undefined) continue;
        
        // Headsign unici
        var allHeadsigns = [];
        for (var ti = 0; ti < line.trips.length; ti++) {
          try {
            var h = line.trips[ti].headsign || "";
            if (h && allHeadsigns.indexOf(h) === -1) allHeadsigns.push(h);
          } catch(ee) {}
        }
        var headsign = allHeadsigns.join(" — ");
        
        results.push({
          displayName: "Linea " + ln + serviceLabel,
          displaySubtitle: headsign + " (" + firstTrip.stops.length + " fermate)",
          name: ln,
          lat: fs.lat,
          lon: fs.lon,
          lineNumber: ln,
          direction: firstTrip.dir,
          stopCount: firstTrip.stops.length,
          dist: distance(userLat, userLng, fs.lat, fs.lon)
        });
      } catch(ee) {
        appLog("⚠️ Skipping line " + keys[ki] + ": " + (ee.message||""));
      }
    }
    
    // Se stale, non mandare
    if (reqId !== _busSearchReqId) return;
    
    results.sort(function(a, b) { return a.dist - b.dist; });
    _lastSearchResults = results;
    try { webkit.messageHandlers.searchResults.postMessage(results); } catch(e) {}
    appLog("✅ Bus search '" + query + "': " + results.length + " risultati");
  } catch(e) {
    appLog("❌ nativeSearchBusLine error: " + e.message);
  }
}

function selectBusLine(lineNum, dir) {
  appLog("🗺️ selectBusLine(" + lineNum + ", " + dir + ")");
  clearRoute();
  clearDestination();
  clearBusRouteLayers();
  
  if (!_gtfsDB) {
    appLog("⏳ _gtfsDB non caricato, richiedo...");
    try { webkit.messageHandlers.requestGtfs.postMessage(""); } catch(e) {}
    setTimeout(function() { selectBusLine(lineNum, dir); }, 500);
    return;
  }
  
  var line = _gtfsDB.lines[lineNum];
  if (!line) {
    var keys = Object.keys(_gtfsDB.lines);
    appLog("❌ line '" + lineNum + "' not found. Keys:" + keys.slice(0,10).join(",") + "... total=" + keys.length);
    return;
  }
  appLog("✅ line found: " + line.name);
  
  var trip = null;
  for (var i = 0; i < line.trips.length; i++) {
    if (line.trips[i].dir === dir) { trip = line.trips[i]; break; }
  }
  if (!trip) { appLog("❌ no trip for dir " + dir + " (trips=" + line.trips.length + ")"); return; }
  
  // Trova trip dir opposta dalla GTFS (percorso reale TPER)
  var returnTrip = null;
  for (var i = 0; i < line.trips.length; i++) {
    if (line.trips[i].dir !== dir) { returnTrip = line.trips[i]; break; }
  }
  var returnStops = returnTrip ? returnTrip.stops : null;
  
  appLog("✅ trip found: shape=" + trip.shape.length + "pts, stops=" + trip.stops.length + ", returnTrip=" + (returnTrip ? "yes (" + returnTrip.stops.length + " fermate)" : "no"));
  
  // Ferma Nav Engine prima di muovere camera
  stopNavEngine();
  
  // === DISEGNO IMMEDIATO (raw shape GTFS per velocità) ===
  var coords = trip.shape.map(function(p) { return [p[1], p[0]]; });
  var drawOk = false;
  
  try {
    // Rimuovi TUTTI i layer vecchi
    try { map.removeLayer('route-line'); } catch(e) {}
    try { map.removeSource('route-line'); } catch(e) {}
    try { map.removeLayer('route-line-v2'); } catch(e) {}
    try { map.removeSource('route-line-v2'); } catch(e) {}
    try { map.removeLayer('bus-route'); } catch(e) {}
    try { map.removeSource('bus-route'); } catch(e) {}
    try { map.removeLayer('bus-route-v1'); } catch(e) {}
    try { map.removeSource('bus-route-v1'); } catch(e) {}
    try { map.removeLayer('bus-route-v2'); } catch(e) {}
    try { map.removeSource('bus-route-v2'); } catch(e) {}
    
    // Layer verde (andata) — raw shape GTFS iniziale
    map.addSource('bus-route-v1', {
      type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } }
    });
    map.addLayer({
      id: 'bus-route-v1',
      type: 'line',
      source: 'bus-route-v1',
      layout: { 'line-join': 'round', 'line-cap': 'round' },
      paint: { 'line-color': '#22cc44', 'line-width': 6, 'line-opacity': 0.9 }
    });
    // Sposta pallino blu SOPRA il percorso
    try { map.moveLayer('user-location-layer'); } catch(ee) {}
    try { map.moveLayer('user-location-ring'); } catch(ee) {}
    
    // Marker destinazione
    var lastCoord = coords[coords.length - 1];
    try { if (markerDest) { markerDest.remove(); markerDest = null; } } catch(e) {}
    var el = document.createElement('div');
    el.style.cssText = "width:16px;height:16px;border-radius:50%;background:#e74c3c;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5)";
    markerDest = new maplibregl.Marker({element:el, anchor:'center'}).setLngLat(lastCoord).addTo(map);
    
    // Fit bounds
    try {
      var bounds = new maplibregl.LngLatBounds();
      coords.forEach(function(c) { bounds.extend(c); });
      var center = bounds.getCenter();
      map.jumpTo({center: [center.lng, center.lat], zoom: 11, pitch: 0});
      appLog("✅ jumpTo centro mappa: " + center.lng.toFixed(4) + "," + center.lat.toFixed(4));
    } catch(e) { appLog("⚠️ jumpTo err: " + e.message); }
    
    drawOk = true;
    appLog("✅ Bus-route-v1 OK (" + coords.length + " pt, marker " + lastCoord[0].toFixed(4) + "," + lastCoord[1].toFixed(4) + ")");
  } catch(e) { appLog("❌ bus-route-v1 ERR: " + e.message); }
  
  if (drawOk) {
    appLog("✅ Bus route pronto (" + coords.length + " pt, " + trip.stops.length + " fermate)");
    
    // Fermate ANDATA (verdi)
    _clearBusStopMarkers();
    trip.stops.forEach(function(s, idx) {
      var el = document.createElement('div');
      var style = "width:14px;height:14px;border-radius:50%;background:#22cc44;border:2px solid #fff;cursor:pointer;";
      if (idx === 0 || idx === trip.stops.length - 1) {
        style = "width:18px;height:18px;border-radius:50%;background:#e74c3c;border:3px solid #fff;cursor:pointer;";
      }
      el.style.cssText = style;
      el.title = s.name;
      var m = new maplibregl.Marker({element: el, anchor: 'center'})
        .setLngLat([s.lon, s.lat])
        .setPopup(new maplibregl.Popup({offset: 10}).setText(s.name))
        .addTo(map);
      _busStopMarkerList.push(m);
    });
    appLog("✅ Bus route drawn: " + lineNum + " dir " + dir + " (" + trip.stops.length + " andata stops)");

    // Fermate RITORNO (rosse)
    if (returnStops && returnStops.length >= 2) {
      returnStops.forEach(function(s, idx) {
        var el = document.createElement('div');
        var style = "width:12px;height:12px;border-radius:50%;background:#cc2222;border:2px solid #fff;cursor:pointer;";
        if (idx === 0 || idx === returnStops.length - 1) {
          style = "width:16px;height:16px;border-radius:50%;background:#cc2222;border:3px solid #fff;cursor:pointer;";
        }
        el.style.cssText = style;
        el.title = s.name;
        var m = new maplibregl.Marker({element: el, anchor: 'center'})
          .setLngLat([s.lon, s.lat])
          .setPopup(new maplibregl.Popup({offset: 10}).setText(s.name))
          .addTo(map);
        _busStopMarkerList.push(m);
      });
      appLog("✅ Return stops drawn: " + returnStops.length + " fermate (rosse)");
    }
    
    _busNavData = { line: lineNum, dir: dir, trip: trip, returnStops: returnStops };
    
    // === ASYNC: OSRM attraverso tutte le fermate (strade vere, non shape) ===
    var waypoints = trip.stops.map(function(s) { return s.lon + "," + s.lat; }).join(";");
    var osrmUrl = OSRM_URL + "/route/v1/driving/" + waypoints + "?geometries=geojson&overview=full&alternatives=false";
    var osrmController = new AbortController();
    var osrmTimeout = setTimeout(function() { osrmController.abort(); }, 10000);
    
    fetch(osrmUrl, {signal: osrmController.signal}).then(function(r) { return r.json(); }).then(function(data) {
      clearTimeout(osrmTimeout);
      if (data && data.routes && data.routes[0]) {
        var roadCoords = data.routes[0].geometry.coordinates;
        appLog("✅ OSRM stops route: " + roadCoords.length + " pt");
        // Aggiorna layer verde con percorso su strada
        try { map.getSource('bus-route-v1').setData({type:'Feature', geometry:{type:'LineString', coordinates:roadCoords}}); } catch(ee) {}
        // Aggiorna fitBounds
        try {
          var b = new maplibregl.LngLatBounds();
          roadCoords.forEach(function(c) { b.extend(c); });
          map.fitBounds(b, {padding: 80, pitch: 50, maxZoom: 16});
        } catch(ee) {}
        // Aggiorna marker destinazione (ultimo punto del percorso OSRM)
        var lastRc = roadCoords[roadCoords.length-1];
        if (markerDest) { try { markerDest.setLngLat(lastRc); } catch(ee) {} }
        // Salva per navigazione
        _busOsrmCoords = roadCoords;
      } else {
        appLog("⚠️ OSRM stops route empty, keeping raw shape");
        _busOsrmCoords = null;
      }
    }).catch(function(err) {
      clearTimeout(osrmTimeout);
      appLog("⚠️ OSRM stops route error: " + (err.message||err));
      _busOsrmCoords = null;
    });
    
    // === PERCORSO RITORNO (rosso) — stesse fermate invertite ===
    if (returnStops && returnStops.length >= 2) {
      var retWaypoints = returnStops.map(function(s) { return s.lon + "," + s.lat; }).join(";");
      var retUrl = OSRM_URL + "/route/v1/driving/" + retWaypoints + "?geometries=geojson&overview=full&alternatives=false";
      var retController = new AbortController();
      var retTimeout = setTimeout(function() { retController.abort(); }, 10000);
      
      fetch(retUrl, {signal: retController.signal}).then(function(r) { return r.json(); }).then(function(data) {
        clearTimeout(retTimeout);
        if (data && data.routes && data.routes[0]) {
          var retCoords = data.routes[0].geometry.coordinates;
          appLog("✅ Return route (dir opposta): " + retCoords.length + " pt (rosso)");
          try {
            map.addSource('bus-route-v2', {
              type: 'geojson',
              data: { type: 'Feature', geometry: { type: 'LineString', coordinates: retCoords } }
            });
            map.addLayer({
              id: 'bus-route-v2',
              type: 'line',
              source: 'bus-route-v2',
              layout: { 'line-join': 'round', 'line-cap': 'round' },
              paint: { 'line-color': '#cc2222', 'line-width': 4, 'line-opacity': 0.6 }
            });
            // Sposta pallino blu SOPRA anche questo layer
            try { map.moveLayer('user-location-layer'); } catch(ee) {}
            try { map.moveLayer('user-location-ring'); } catch(ee) {}
            appLog("✅ Return route drawn (rosso) — " + returnStops.length + " fermate (invertite)");
            // Salva coords ritorno per navigazione
            _busOsrmCoordsReturn = retCoords;
          } catch(ee) { appLog("⚠️ Return route draw: " + (ee.message||'')); }
        } else {
          appLog("⚠️ Return OSRM empty, skipping red route");
        }
      }).catch(function(err) {
        clearTimeout(retTimeout);
        // Fallback: raw shape del returnTrip GTFS
        try {
          var retShape = returnTrip.shape.map(function(p) { return [p[1], p[0]]; });
          map.addSource('bus-route-v2', {
            type: 'geojson',
            data: { type: 'Feature', geometry: { type: 'LineString', coordinates: retShape } }
          });
          map.addLayer({
            id: 'bus-route-v2', type: 'line', source: 'bus-route-v2',
            paint: { 'line-color': '#cc2222', 'line-width': 4, 'line-opacity': 0.6 }
          });
          try { map.moveLayer('user-location-layer'); } catch(ee) {}
          try { map.moveLayer('user-location-ring'); } catch(ee) {}
        } catch(ee) {}
      });
    }
    
    // routeReady dopo 500ms (per dare tempo a OSRM di completare, ma non bloccare il pulsante)
    setTimeout(function() {
      // Aggiorna posizione utente sulla mappa SUBITO
      pushPosition(userLat, userLng, userCourse || 0, performance.now());
      try { webkit.messageHandlers.routeReady.postMessage("ok"); } catch(e) {}
    }, 500);
  } else {
    appLog("❌ selectBusLine: route drawing failed, VAI non mostrato");
  }
}

function clearBusRouteLayers() {
  try { map.removeLayer('bus-route-v1'); } catch(e) {}
  try { map.removeSource('bus-route-v1'); } catch(e) {}
  try { map.removeLayer('bus-route-v2'); } catch(e) {}
  try { map.removeSource('bus-route-v2'); } catch(e) {}
  _busOsrmCoordsReturn = null;
  try { map.removeLayer('bus-route'); } catch(e) {}
  try { map.removeSource('bus-route'); } catch(e) {}
  try { map.removeLayer('route-line'); } catch(e) {}
  try { map.removeSource('route-line'); } catch(e) {}
  _clearBusStopMarkers();
  _busNavData = null;
  _busOsrmCoords = null;
}

function _clearBusStopMarkers() {
  _busStopMarkerList.forEach(function(m) {
    try { m.remove(); } catch(e) {}
  });
  _busStopMarkerList = [];
}

function startBusNavigation(dirOverride) {
  appLog("▶️ Bus navigation start" + (dirOverride ? " (" + dirOverride + ")" : ""));
  var busData = _busNavData;
  if (!busData || !busData.trip) {
    appLog("⚠️ No bus data for navigation");
    return;
  }
  var trip = busData.trip;
  // RITORNO = stesse fermate invertite (stessi capolinea, percorso opposto)
  var returnStops = (dirOverride === 'ritorno') ? busData.returnStops : null;
  if (returnStops) {
    appLog("🔄 Navigazione RITORNO: " + returnStops.length + " fermate (TPER returnTrip)");
  }
  var firstStop = returnStops ? returnStops[0] : trip.stops[0];
  var lastStop = returnStops ? returnStops[returnStops.length - 1] : trip.stops[trip.stops.length - 1];
  
  // Use OSRM through all stops (strade vere) instead of raw GTFS shape
  var osrmCoords = returnStops ? _busOsrmCoordsReturn : _busOsrmCoords;
  if (osrmCoords && osrmCoords.length >= 2) {
    appLog("✅ Using pre-fetched OSRM route (" + osrmCoords.length + " pt)");
    // Just need user→firstStop, then combine
    var osrmUrl = OSRM_URL + "/route/v1/driving/"
      + userLng + "," + userLat + ";"
      + firstStop.lon + "," + firstStop.lat
      + "?geometries=geojson&overview=full";
    
    fetch(osrmUrl)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var userCoords = (data && data.routes && data.routes[0]) ? data.routes[0].geometry.coordinates : [];
        var combined = userCoords.concat(osrmCoords);
        appLog("✅ Combined: user " + userCoords.length + " + OSRM stops " + osrmCoords.length + " = " + combined.length + " pt");
        startBusNavWithCoords(combined, busData, lastStop);
      })
      .catch(function(err) {
        appLog("⚠️ User→stop OSRM error: " + (err.message||err) + ", using stops route only");
        startBusNavWithCoords(osrmCoords, busData, lastStop);
      });
  } else {
    // Fetch OSRM through all stops now (waypoints: user + stops)
    var navStops = returnStops || trip.stops;
    var waypoints = [userLng + "," + userLat];
    for (var i = 0; i < navStops.length; i++) {
      waypoints.push(navStops[i].lon + "," + navStops[i].lat);
    }
    var osrmUrl = OSRM_URL + "/route/v1/driving/" + waypoints.join(";") + "?geometries=geojson&overview=full&alternatives=false";
    appLog("🧭 Bus OSRM through " + navStops.length + " stops (" + waypoints.length + " waypoints)");
    
    var controller = new AbortController();
    var timeoutId = setTimeout(function() { controller.abort(); }, 15000);
    
    fetch(osrmUrl, {signal: controller.signal})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        clearTimeout(timeoutId);
        if (data && data.routes && data.routes[0]) {
          var combined = data.routes[0].geometry.coordinates;
          appLog("✅ OSRM full route: " + combined.length + " pt");
          startBusNavWithCoords(combined, busData, lastStop);
        } else {
          throw "no route";
        }
      })
      .catch(function(err) {
        clearTimeout(timeoutId);
        appLog("⚠️ Full OSRM failed: " + (err.message||err) + ", using raw shape fallback");
        // Fallback: raw shape (invertita per ritorno)
        var busCoords = trip.shape.map(function(p) { return [p[1], p[0]]; });
        if (returnStops) { busCoords = busCoords.slice().reverse(); }
        startBusNavWithCoords(busCoords, busData, lastStop);
      });
  }
}

function startBusNavWithCoords(combined, busData, lastStop) {
  // Set navigation state
  navRoute = { type: 'LineString', coordinates: combined };
  navCoords = combined.slice();
  
  // AGGIORNA IL PERCORSO VISIBILE sulla mappa col percorso OSRM (strade vere)
  try {
    var src = map.getSource('bus-route-v1');
    if (src) {
      src.setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: combined } });
      appLog("✅ Mappa aggiornata: bus-route-v1 (" + combined.length + " pt)");
    }
  } catch(ee) { appLog("⚠️ update route display: " + (ee.message||'')); }
  
  _totalRouteDist = 0;
  for (var j = 1; j < combined.length; j++) {
    _totalRouteDist += distance(combined[j-1][1], combined[j-1][0], combined[j][1], combined[j][0]);
  }
  navDistance = _totalRouteDist;
  _routeSteps = [{name: "", cumDist: _totalRouteDist}];
  _navCoordOffset = 0;
  _destLat = lastStop.lat;
  _destLon = lastStop.lon;
  _destName = "Linea " + busData.line + " - " + lastStop.name;
  
  // Send sim coords
  try {
    var simArr = [];
    for (var si = 0; si < combined.length; si++) {
      simArr.push({lat: combined[si][1], lon: combined[si][0]});
    }
    webkit.messageHandlers.simCoords.postMessage(JSON.stringify(simArr));
  } catch(e) {}
  
  // Start navigation
  appLog("▶️ Starting bus navigation...");
  navETA = _totalRouteDist / 13.9;
  isNavigating = true;
  hasGps = true;
  // Push posizione corrente per updatePosition (aggiorna subito la freccia)
  pushPosition(userLat, userLng, userCourse || 0, performance.now());
  if (navTimer) clearInterval(navTimer);
  navTimer = setInterval(function() { navTick(); }, 1000);
  
  // Notifica ObjC
  try { webkit.messageHandlers.navigationStart.postMessage(JSON.stringify({
    distance: _totalRouteDist,
    eta: _totalRouteDist / 13.9,
    name: _destName
  })); } catch(e) {}
  
  // Forza push posizione tra 500ms, 1s e 2s per assicurarsi buffer pieno
  // (in caso GPS non arrivi subito da ObjC)
  var _pushCount = 0;
  var _pushTimer = setInterval(function() {
    _pushCount++;
    appLog("⏱️ Nav push forced #" + _pushCount + " pos=" + userLat.toFixed(4) + "," + userLng.toFixed(4));
    pushPosition(userLat, userLng, userCourse || 0, performance.now());
    if (_pushCount >= 10) clearInterval(_pushTimer); // dopo 10 push (5s), ferma
  }, 500);
}

// ---- BUS STOPS ----
function busStopsFromJSON(jsonStr) {
  try {
    var stops = JSON.parse(jsonStr);
    if (window._busStopMarkers) {
      window._busStopMarkers.forEach(function(m) { m.remove(); });
    }
    window._busStopMarkers = [];
    
    stops.forEach(function(s) {
      var lat = (s.lat !== undefined) ? parseFloat(s.lat) : (s.center && s.center.lat !== undefined ? parseFloat(s.center.lat) : null);
      var lon = (s.lon !== undefined) ? parseFloat(s.lon) : (s.center && s.center.lon !== undefined ? parseFloat(s.center.lon) : null);
      if (lat === null || lon === null || isNaN(lat) || isNaN(lon)) return;
      
      var el = document.createElement("div");
      el.style.cssText = "width:12px;height:12px;border-radius:50%;background:#f39c12;border:2px solid #fff";
      var m = new maplibregl.Marker({element:el,anchor:"center"})
        .setLngLat([lon, lat])
        .addTo(map);
      window._busStopMarkers.push(m);
    });
    return window._busStopMarkers.length;
  } catch(e) {
    console.error("busStopsFromJSON error:", e);
    return 0;
  }
}

function busStopsSetVisible(visible) {
  if (window._busStopMarkers) {
    window._busStopMarkers.forEach(function(m) {
      m.getElement().style.display = visible ? "block" : "none";
    });
  }
}

// ===================================================================
// HELPERS
// ===================================================================
function distance(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2-lat1)*Math.PI/180;
  var dLng = (lng2-lng1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearing(lat1, lng1, lat2, lng2) {
  var dL = (lng2-lng1)*Math.PI/180;
  var y = Math.sin(dL)*Math.cos(lat2*Math.PI/180);
  var x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// ===================================================================
// FUNZIONI CHIAMATE DA OBJC (impostazioni mappa)
// ===================================================================
var _lastBrightness = 1.0;
var _isDark = false;

function setMapType(type) {
  if (type === 1) {
    document.getElementById("map").style.filter = "invert(0.9) hue-rotate(180deg) brightness(0.7)";
    _isDark = true;
    appLog("→ setMapType(1) modalità notturna ON");
  } else {
    document.getElementById("map").style.filter = "";
    _isDark = false;
    appLog("→ setMapType(0) modalità notturna OFF");
  }
}

function setMapBrightness(val) {
  var bright = 1.0 - val * 0.95;
  _lastBrightness = bright;
  if (_isDark) {
    document.getElementById("map").style.filter = "brightness(" + (bright*0.7) + ") invert(0.9) hue-rotate(180deg)";
  } else {
    document.getElementById("map").style.filter = "brightness(" + bright + ")";
  }
  appLog("→ setMapBrightness(" + val.toFixed(2) + ") → filtro luminosità " + bright.toFixed(2));
}

// Restituisce info testuali per i pulsanti ANDATA/RITORNO
function getBusRouteInfo() {
  if (!_busNavData || !_busNavData.trip) return JSON.stringify({andata: "", ritorno: ""});
  var trip = _busNavData.trip;
  var firstStop = trip.stops[0];
  var lastStop = trip.stops[trip.stops.length - 1];
  var andataText = (firstStop ? firstStop.name : "?") + " → " + (lastStop ? lastStop.name : "?");
  var ritText = "";
  if (_busNavData.returnStops && _busNavData.returnStops.length >= 2) {
    var rFirst = _busNavData.returnStops[0];
    var rLast = _busNavData.returnStops[_busNavData.returnStops.length - 1];
    ritText = (rFirst ? rFirst.name : "?") + " → " + (rLast ? rLast.name : "?");
  }
  return JSON.stringify({andata: andataText, ritorno: ritText});
}

// Setup per simulazione bus: setta navCoords e restituisce JSON coords
function setupBusSimulation() {
  if (_busOsrmCoords && _busOsrmCoords.length >= 2) {
    navCoords = _busOsrmCoords.slice();
    return JSON.stringify(_busOsrmCoords);
  }
  return '[]';
}
