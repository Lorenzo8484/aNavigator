<body>
<div id="map"></div>
<script>
// ===================================================================
// LOG HELPER — invia log al pannello log integrato (ObjC)
// ===================================================================
function appLog(msg) {
  try { webkit.messageHandlers.appLog.postMessage(msg); } catch(e) {}
  console.log(msg);
}

// JS error catcher — invia errori al pannello log integrato
window.onerror = function(msg, url, line) {
  appLog("❌ JS ERR: " + msg + " (line " + line + ")");
  return true;
};
// ===================================================================
// CONFIG
// ===================================================================
const OSRM_URL = "https://router.project-osrm.org";
const NOMINATIM_URL = "https://nominatim.openstreetmap.org";

// ===================================================================
// STATO
// ===================================================================
var userLat = 44.49, userLng = 11.34, userCourse = 0;
var isNavigating = false;
var navRoute = null;           // GeoJSON route geometry
var navCoords = [];            // [lng, lat] array route coordinates
var navInstruction = "";
var navDistance = 0;
var navETA = 0;
var navSpeed = 0;
var markerArrow = null;
var markerDest = null;
var navTimer = null;
var hasGps = false;
var _destLat = null, _destLon = null, _destName = "";
var recalcLat = userLat, recalcLng = userLng;
var _routeSteps = []; // OSRM steps: {name, cumDist}
var _navCoordOffset = 0; // offset assoluto per lookup nome via
var _totalRouteDist = 0; // distanza totale del percorso in metri
var _routingProfile = "driving"; // default auto, cambia con setRoutingProfile
var _snappedShape = null; // TPER shape snappata su strada (formato [[lat,lon],...] per simCoords)

// ===================================================================
// MAPLIBRE GL JS — con stile OpenFreeMap
// ===================================================================
var map = null;
try {
  map = new maplibregl.Map({
    container: "map",
    style: "https://tiles.openfreemap.org/styles/liberty",
    center: [11.34, 44.49],
    zoom: 14,
    pitch: 50,
    bearing: 0,
    maxPitch: 85,
    attributionControl: false
  });
  // Bussola nativa MapLibre GL
  map.addControl(new maplibregl.NavigationControl({showCompass: true, showZoom: false}), 'bottom-left');
  
  // === LAYER POSIZIONE UTENTE (pallino blu, sempre visibile) ===
  // Questo layer mostra la posizione GPS su tutta la mappa, senza navigazione
  map.addSource('user-location', {
    type: 'geojson',
    data: { type: 'Feature', geometry: { type: 'Point', coordinates: [11.34, 44.49] } }
  });
  map.addLayer({
    id: 'user-location-layer',
    type: 'circle',
    source: 'user-location',
    paint: {
      'circle-radius': 8,
      'circle-color': '#4488ff',
      'circle-stroke-width': 3,
      'circle-stroke-color': '#ffffff',
      'circle-opacity': 0.9
    }
  });
  // Layer anello esterno (pulsazione per GPS attivo)
  map.addLayer({
    id: 'user-location-ring',
    type: 'circle',
    source: 'user-location',
    paint: {
      'circle-radius': 14,
      'circle-color': 'rgba(68, 136, 255, 0.2)',
      'circle-stroke-width': 0
    }
  });
} catch(e) {
  appLog("❌ MapLibre init error: " + (e.message || e));
}

// Hide buildings when style loads
if (map) {
  map.on("style.load", function() {
    try { if (map.getLayer("building")) map.setLayoutProperty("building", "visibility", "none"); } catch(e) {}
    try { if (map.getLayer("building_outline")) map.setLayoutProperty("building_outline", "visibility", "none"); } catch(e) {}
    appLog("✓ Stile map caricato (OpenFreeMap liberty)");
  });
}

// ===================================================================
// FUNZIONI CHIAMATE DA OBJC (via evaluateJavaScript)
// ===================================================================

// ---- NAVIGATION ENGINE (JS-side prediction at 60fps via rAF) ----
// ObjC invia pushPosition a 5fps. JS interpola a 60fps con requestAnimationFrame.
// ZERO bridge calls durante il loop. Arrow + camera sincroni su ogni frame.
// ===================================================================

var _navEngineSource = null;
var _navEngineRunning = false;
var _navEngineFrameId = null;
var _navEnginePending = []; // buffer sliding di 2 posizioni
var _camOffset = 0;     // offset laterale (destra/sinistra), slider
var _camVertOffset = 0; // offset verticale (su/giù), slider
var _camZoom = 16;      // zoom camera
var _camPitch = 60;     // pitch camera

// Init: crea source GeoJSON + Symbol Layer per la freccia
function initNavEngine() {
  if (_navEngineSource) return;
  try {
    // Crea overlay log JS (100 righe)
    var logDiv = document.createElement('div');
    logDiv.id = 'js-log-overlay';
    logDiv.style.cssText = 'position:fixed;bottom:50px;left:5px;right:5px;max-height:120px;overflow-y:auto;background:rgba(0,0,0,0.7);color:#fff;font-size:9px;font-family:monospace;padding:4px;border-radius:6px;z-index:999;display:none;';
    document.body.appendChild(logDiv);
    window._jsLogLines = [];
    // Sovrascrivi appLog per salvare le ultime 100 righe
    var origAppLog = window.appLog;
    window.appLog = function(msg) {
      try {
        origAppLog(msg);
        var lines = window._jsLogLines;
        lines.push(msg);
        if (lines.length > 100) lines.splice(0, lines.length - 100);
        var div = document.getElementById('js-log-overlay');
        if (div && div.style.display !== 'none') {
          div.innerHTML = lines.join('<br>');
          div.scrollTop = div.scrollHeight;
        }
      } catch(e) {}
    };
    // Source GeoJSON separata
    map.addSource('nav-arrow', {
      type: 'geojson',
      data: { type: 'Feature', geometry: { type: 'Point', coordinates: [0, 0] }, properties: { bearing: 0 } }
    });
    
    // Carica icona freccia (PNG via canvas)
    var c = document.createElement('canvas');
    c.width = 36; c.height = 36;
    var ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 36, 36);
    ctx.fillStyle = '#4488ff';
    ctx.beginPath();
    ctx.moveTo(18, 2); ctx.lineTo(30, 30); ctx.lineTo(18, 24); ctx.lineTo(6, 30); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(18, 15, 5, 0, 2*Math.PI); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1; ctx.stroke();
    map.addImage('nav-arrow-icon', ctx.getImageData(0, 0, 36, 36));
    
    // Symbol Layer
    map.addLayer({
      id: 'nav-arrow-layer',
      type: 'symbol',
      source: 'nav-arrow',
      layout: {
        'icon-image': 'nav-arrow-icon',
        'icon-size': 1.2,
        'icon-rotate': ['get', 'bearing'],
        'icon-rotation-alignment': 'map',
        'icon-allow-overlap': true,
        'icon-ignore-placement': true
      }
    });
    
    _navEngineSource = map.getSource('nav-arrow');
    appLog("✅ Nav Engine init OK");
  } catch(e) {
    appLog("❌ Nav Engine init ERR: " + (e.message || e));
  }
}

// Chiamata da ObjC a 5fps — pusha posizione corrente
function pushPosition(lat, lng, bearing, ts) {
  // Aggiorna posizione globale per navTick() JS che cerca closest point
  userLat = lat;
  userLng = lng;
  _navEnginePending.push({ lat: lat, lng: lng, bearing: bearing, ts: performance.now() });
  if (_navEnginePending.length > 2) _navEnginePending.shift();
  // Aggiorna pallino posizione utente (sempre visibile)
  try {
    var src = map.getSource('user-location');
    if (src) src.setData({ type: 'Feature', geometry: { type: 'Point', coordinates: [lng, lat] } });
  } catch(e) {}
}

// Avvia rAF loop
function startNavEngine() {
  if (_navEngineRunning) return;
  initNavEngine();
  _navEngineRunning = true;
  appLog("▶️ Nav Engine rAF start");
  
  // Se abbiamo almeno una posizione, usala SUBITO (senza aspettare interpolazione)
  if (_navEnginePending.length >= 1) {
    var p = _navEnginePending[_navEnginePending.length - 1];
    _navEngineSource.setData({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
      properties: { bearing: p.bearing }
    });
    _navEngineJumpTo(p.lat, p.lng, p.bearing);
  }
  
  // Inizializza dead zone bearing
  var _lastNavBearing = -1;
  
  function _navEngineJumpTo(lat, lng, bearing) {
    try {
      // Offset laterale/verticale
      var bearingRad = bearing * Math.PI / 180.0;
      var latPerMeter = 1.0 / 111320.0;
      var lonPerMeter = 1.0 / (111320.0 * Math.cos(lat * Math.PI / 180.0));
      var offLat = _camOffset * Math.cos(bearingRad + Math.PI/2) * latPerMeter
                + _camVertOffset * Math.cos(bearingRad) * latPerMeter;
      var offLng = _camOffset * Math.sin(bearingRad + Math.PI/2) * lonPerMeter
                + _camVertOffset * Math.sin(bearingRad) * lonPerMeter;
      
      map.easeTo({
        center: [lng + offLng, lat + offLat],
        bearing: bearing,
        zoom: _camZoom,
        pitch: _camPitch,
        duration: 30,
        easing: function(t) { return t; }
      });
    } catch(e) {}
  }
  function tick(now) {
    if (!_navEngineRunning) return;
    
    if (_navEnginePending.length >= 2) {
      var last = _navEnginePending[0];
      var next = _navEnginePending[1];
      var elapsed = now - (last.ts || now);
      var duration = (next.ts || now) - (last.ts || now);
      var t = duration > 0 ? elapsed / duration : 1;
      if (t > 1) t = 1;
      
      // Interpolazione lineare
      var lat = last.lat + (next.lat - last.lat) * t;
      var lng = last.lng + (next.lng - last.lng) * t;
      var diff = next.bearing - last.bearing;
      if (diff > 180) diff -= 360;
      if (diff < -180) diff += 360;
      var bearing = last.bearing + diff * t;
      if (bearing < 0) bearing += 360;
      if (bearing >= 360) bearing -= 360;
      
      // Aggiorna freccia
      _navEngineSource.setData({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [lng, lat] },
        properties: { bearing: bearing }
      });
      
      // Camera con offset + easeTo fluido
      _navEngineJumpTo(lat, lng, bearing);
    }
    
    _navEngineFrameId = requestAnimationFrame(tick);
  }
  _navEngineFrameId = requestAnimationFrame(tick);
}

// Ferma rAF loop
function stopNavEngine() {
  _navEngineRunning = false;
  if (_navEngineFrameId) { cancelAnimationFrame(_navEngineFrameId); _navEngineFrameId = null; }
  _navEnginePending.length = 0;
  appLog("⏹️ Nav Engine rAF stop");
}

// ===================================================================
// SEARCH (Nominatim)
// ===================================================================
var _searchReqId = 0;
var _searchTimer = null;
var _lastSearchResults = [];
var _userCity = "Bologna";

function _getUserCity() {
  var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' + userLat + '&lon=' + userLng + '&zoom=10';
  fetch(url, { headers: { 'User-Agent': 'aNavigator/3.40 (iOS)' } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d && d.address)
        _userCity = d.address.city || d.address.town || d.address.village || d.address.municipality || "Bologna";
    })
    .catch(function() {});
}
_getUserCity();

function _fmtDist(m) {
  if (m < 1000) return Math.round(m) + " m";
  return (m / 1000).toFixed(1) + " km";
}

function _parseOne(item) {
  try {
    var a = item.address || {};
    var strada = a.road || a.pedestrian || a.footway || a.street || a.suburb || "";
    var civico = a.house_number || "";
    var nome = strada;
    if (civico) nome += ", " + civico;
    if (!nome) nome = item.name || (item.display_name ? item.display_name.split(',')[0].trim() : "?");
    var citta = a.city || a.town || a.village || a.municipality || a.county || "";
    var dist = distance(userLat, userLng, parseFloat(item.lat), parseFloat(item.lon));
    if (isNaN(dist)) dist = 99999999;
    var sub = citta || a.state || "";
    if (sub) sub += " — " + _fmtDist(dist);
    else sub = _fmtDist(dist);
    return { displayName: nome, displaySubtitle: sub, name: nome, lat: parseFloat(item.lat), lon: parseFloat(item.lon), full: item.display_name || "", dist: dist, city: citta };
  } catch(e) { return null; }
}

function _fetchData(url) {
  return fetch(url, {
    headers: {
      'Accept': 'application/json',
      'User-Agent': 'aNavigator/3.40 (iOS; Italia)',
      'Accept-Language': 'it, en'
    }
  })
    .then(function(r) {
      if (!r.ok) { appLog("  ⚠️ HTTP " + r.status); return []; }
      return r.json();
    })
    .then(function(data) { return Array.isArray(data) ? data : []; })
    .catch(function() { return []; });
}

function _searchAndPost(query, reqId) {
  var url1 = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query)
    + '&limit=30&countrycodes=it&addressdetails=1&lat=' + userLat + '&lon=' + userLng;
  
  _fetchData(url1).then(function(data1) {
    if (reqId !== _searchReqId) return;
    var parsed1 = [];
    data1.forEach(function(item) { var p = _parseOne(item); if (p) parsed1.push(p); });
    
    if (!_userCity) {
      parsed1.sort(function(a, b) { return a.dist - b.dist; });
      _lastSearchResults = parsed1;
      try { webkit.messageHandlers.searchResults.postMessage(parsed1); } catch(e) {}
      return;
    }
    
    var url2 = 'https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(query + " " + _userCity)
      + '&limit=15&countrycodes=it&addressdetails=1&lat=' + userLat + '&lon=' + userLng;
    
    _fetchData(url2).then(function(data2) {
      if (reqId !== _searchReqId) return;
      var parsed2 = [];
      data2.forEach(function(item) { var p = _parseOne(item); if (p) parsed2.push(p); });
      
      var all = parsed1.concat(parsed2);
      var seen = {};
      var merged = [];
      for (var i = 0; i < all.length; i++) {
        var key = Math.round(all[i].lat * 1000) + "_" + Math.round(all[i].lon * 1000) + "_" + (all[i].name || "").substring(0, 30);
        if (seen[key]) continue;
        seen[key] = true;
        merged.push(all[i]);
      }
      merged.sort(function(a, b) { return a.dist - b.dist; });
      
      _lastSearchResults = merged;
      try { webkit.messageHandlers.searchResults.postMessage(merged); } catch(e) {}
    }).catch(function() {
      if (reqId === _searchReqId) {
        parsed1.sort(function(a, b) { return a.dist - b.dist; });
        _lastSearchResults = parsed1;
        try { webkit.messageHandlers.searchResults.postMessage(parsed1); } catch(e) {}
      }
    });
  }).catch(function() {
    if (reqId === _searchReqId && _lastSearchResults.length > 0)
      try { webkit.messageHandlers.searchResults.postMessage(_lastSearchResults); } catch(e) {}
  });
}

function nativeSearchOSM(query) {
  try {
    query = (query || "").trim();
    if (_searchTimer) { clearTimeout(_searchTimer); _searchTimer = null; }
    
    if (query.length < 2) {
      if (_lastSearchResults.length > 0)
        try { webkit.messageHandlers.searchResults.postMessage(_lastSearchResults); } catch(e) {}
      return;
    }
    
    _searchTimer = setTimeout(function() {
      _searchTimer = null;
      _searchAndPost(query, ++_searchReqId);
    }, 1500);
  } catch(e) {
    appLog("❌ Search error: " + e.message);
  }
}

function _ensureMapReady(callback) {
  if (map && map.loaded && map.loaded()) {
    callback();
    return;
  }
  appLog("⏳ Mappa non pronta, attendo...");
  map.once("style.load", function() {
    try { if (map.getLayer("building")) map.setLayoutProperty("building", "visibility", "none"); } catch(e) {}
    callback();
  });
  setTimeout(function() { callback(); }, 500);
}

function _waitMapAndAddRoute(geoJson, toLng, toLat) {
  _ensureMapReady(function() {
    clearRoute();
    try {
      map.addSource(_routeLayerId, {
        type: "geojson",
        data: {type: "Feature", geometry: geoJson}
      });
      map.addLayer({
        id: _routeLayerId,
        type: "line",
        source: _routeLayerId,
        layout: {"line-join": "round", "line-cap": "round"},
        paint: {"line-color": "#22cc44", "line-width": 6, "line-opacity": 0.9}
      });
      appLog("✅ Layer route aggiunto");
    } catch(e) {
      appLog("❌ Errore layer route: " + e.message);
    }
    
    try {
      if (markerDest) { markerDest.remove(); markerDest = null; }
    } catch(e) {}
    var el = document.createElement("div");
    el.style.cssText = "width:16px;height:16px;border-radius:50%;background:#e74c3c;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5)";
    markerDest = new maplibregl.Marker({element:el, anchor:"center"})
      .setLngLat([toLng, toLat])
      .addTo(map);
    appLog("✅ Marker destinazione aggiunto a " + toLng.toFixed(4) + "," + toLat.toFixed(4));
    
    try {
      var bounds = new maplibregl.LngLatBounds();
      geoJson.coordinates.forEach(function(c) { bounds.extend(c); });
      map.fitBounds(bounds, {padding:80, pitch:50, maxZoom:16});
      appLog("✅ fitBounds completato");
    } catch(e) {
      appLog("❌ Errore fit bounds: " + e.message);
    }
    
    try { webkit.messageHandlers.routeReady.postMessage("ok"); } catch(e) {}
  });
}

// ---- ROUTING (OSRM) ----
var _routeLayerId = "route-line-v2";

function clearRoute() {
  try { map.removeLayer(_routeLayerId); } catch(e) {}
  try { map.removeSource(_routeLayerId); } catch(e) {}
}

function setRoutingProfile(profile) {
  _routingProfile = profile || "driving";
  appLog("📡 Profilo routing: " + _routingProfile);
}

function calculateRoute(fromLat, fromLng, toLat, toLng, name) {
  _destLat = toLat; _destLon = toLng; _destName = name || "";
  _navCoordOffset = 0;
  clearRoute();
  clearDestination();
  
  appLog("🧭 Calcolo percorso: " + (fromLat.toFixed(4)) + "," + (fromLng.toFixed(4)) + " → " + (toLat.toFixed(4)) + "," + (toLng.toFixed(4)));
  
  var url = OSRM_URL + "/route/v1/" + _routingProfile + "/" + fromLng + "," + fromLat + ";" + toLng + "," + toLat + "?geometries=geojson&steps=true&overview=full";
  
  var controller = new AbortController();
  var timeoutId = setTimeout(function() { controller.abort(); appLog("⏱️ OSRM timeout dopo 10s"); }, 10000);
  
  return fetch(url, {signal: controller.signal})
    .then(function(r) {
      clearTimeout(timeoutId);
      if (!r.ok) { appLog("⚠️ OSRM HTTP " + r.status); return null; }
      return r.json();
    })
    .then(function(data) {
      if (!data || !data.routes || data.routes.length === 0) {
        appLog("⚠️ Nessun percorso trovato");
        return null;
      }
      var route = data.routes[0];
      navRoute = route.geometry;
      navCoords = route.geometry.coordinates.slice();
      navDistance = route.distance;
      navETA = route.duration;
      _totalRouteDist = route.distance;
      
      // Estrai steps con nomi strade da OSRM (usa distanza cumulativa)
      _routeSteps = [];
      if (route.legs && route.legs[0] && route.legs[0].steps) {
        var cumDist = 0;
        for (var si = 0; si < route.legs[0].steps.length; si++) {
          var step = route.legs[0].steps[si];
          cumDist += step.distance || 0;
          _routeSteps.push({
            name: step.name || "",
            cumDist: cumDist  // distanza cumulativa alla fine di questo step
          });
        }
      }
      
      try {
        var simArr = [];
        for (var si = 0; si < navCoords.length; si++) {
          simArr.push({lat: navCoords[si][1], lon: navCoords[si][0]});
        }
        webkit.messageHandlers.simCoords.postMessage(JSON.stringify(simArr));
      } catch(e) {
        appLog("⚠️ simCoords postMessage error: " + e.message);
      }
      
      _waitMapAndAddRoute(route.geometry, toLng, toLat);
      
      return JSON.stringify({
        distance: route.distance,
        duration: route.duration,
        name: name || ""
      });
    })
    .catch(function(err) {
      appLog("❌ OSRM fetch error: " + (err.message || err));
      return null;
    });
}

function startNavigation() {
  isNavigating = true;
  hasGps = true;
  if (navTimer) clearInterval(navTimer);
  navTimer = setInterval(function() { navTick(); }, 1000);
}

function navTick() {
  if (!isNavigating || !hasGps) return;
  
  if (navCoords.length < 2) {
    endNavigation();
    return;
  }
  
  var closest = null, minDist = Infinity;
  for (var i = 0; i < navCoords.length; i++) {
    var d = distance(userLat, userLng, navCoords[i][1], navCoords[i][0]);
    if (d < minDist) { minDist = d; closest = i; }
  }
  
  // Salva closest per slice dopo
  if (closest > 3) {
    _navCoordOffset += closest;
    navCoords = navCoords.slice(closest);
  }
  
  var remaining = 0;
  for (var j = 1; j < navCoords.length; j++) {
    remaining += distance(navCoords[j-1][1], navCoords[j-1][0], navCoords[j][1], navCoords[j][0]);
  }
  
  var instruction = getInstruction(navCoords);
  var traveledDist = _totalRouteDist - remaining;
  var streetName = getCurrentStreetName(traveledDist);
  appLog("via: '" + streetName + "' (dist=" + Math.round(traveledDist) + "m, steps=" + _routeSteps.length + ")");
  
  if (navCoords.length < 2 && remaining < 30) {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.navigationEnd)
      window.webkit.messageHandlers.navigationEnd.postMessage("");
    return;
  }
  
  navDistance = remaining;
  
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.navUpdate) {
    var update = JSON.stringify({
      instruction: instruction,
      streetName: streetName,
      distance: remaining,
      eta: remaining / 13.9,
      speed: navSpeed,
      arrived: false
    });
    window.webkit.messageHandlers.navUpdate.postMessage(update);
  }
  
  if (minDist > 30 && navCoords.length > 2) {
    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.error)
      window.webkit.messageHandlers.error.postMessage("Fuori rotta, ricalcolo...");
  }
}

function getInstruction(coords) {
  if (coords.length < 3) return "Prosegui dritto";
  var b1 = bearing(coords[0][1], coords[0][0], coords[1][1], coords[1][0]);
  var b2 = bearing(coords[1][1], coords[1][0], coords[2][1], coords[2][0]);
  var turn = b2 - b1;
  if (turn > 180) turn -= 360;
  if (turn < -180) turn += 360;
  if (turn > 120 || turn < -120) return "Inversione a U";
  if (turn > 60) return "Svolta a destra";
  if (turn > 20) return "Leggermente a destra";
  if (turn < -60) return "Svolta a sinistra";
  if (turn < -20) return "Leggermente a sinistra";
  return "Prosegui dritto";
}

function snapToRoute(lat, lng) {
  if (!navCoords || navCoords.length < 2) return JSON.stringify({lat:lat, lon:lng});
  var closest = navCoords[0];
  var minDist = Infinity;
  for (var i = 0; i < navCoords.length; i++) {
    var d = distance(lat, lng, navCoords[i][1], navCoords[i][0]);
    if (d < minDist) { minDist = d; closest = navCoords[i]; }
  }
  return JSON.stringify({lat:closest[1], lon:closest[0]});
}

function coordinateAheadOnRoute(lat, lng, meters) {
  if (!navCoords || navCoords.length < 2) return JSON.stringify({lat:lat, lon:lng});
  var closest = 0, minDist = Infinity;
  for (var i = 0; i < navCoords.length; i++) {
    var d = distance(lat, lng, navCoords[i][1], navCoords[i][0]);
    if (d < minDist) { minDist = d; closest = i; }
  }
  var accumulated = 0;
  for (var j = closest + 1; j < navCoords.length; j++) {
    var seg = distance(navCoords[j-1][1], navCoords[j-1][0], navCoords[j][1], navCoords[j][0]);
    accumulated += seg;
    if (accumulated >= meters) {
      return JSON.stringify({lat:navCoords[j][1], lon:navCoords[j][0]});
    }
  }
  var last = navCoords[navCoords.length - 1];
  return JSON.stringify({lat:last[1], lon:last[0]});
}

function getRouteCoords() {
  if (!navCoords || navCoords.length === 0) return "[]";
  var result = [];
  for (var i = 0; i < navCoords.length; i++) {
    result.push({lat: navCoords[i][1], lon: navCoords[i][0]});

function _timeToMin(t) {
  if (!t || t.length < 5) return 0;
  return parseInt(t.substring(0,2)) * 60 + parseInt(t.substring(3,5));
}
function _minToTime(m) {
  m = (Math.round(m) + 1440) % 1440;
  var h = Math.floor(m/60), mn = m%60;
  return (h<10?'0':'')+h+':'+(mn<10?'0':'')+mn;
}
function _patternStop(sl, sr, so, depTime, stopIdx) {
  var depMin = _timeToMin(depTime);
  var stop = sl[sr[stopIdx]], off = so[stopIdx];
  return { name: stop[0], lat: stop[1], lon: stop[2],
    arrival: _minToTime(depMin + off[0]),
    departure: _minToTime(depMin + off[1]) };
}
function _patternStops(sl, sr, so, depTime) {
  var depMin = _timeToMin(depTime);
  var result = [];
  for (var i = 0; i < sr.length; i++) {
    var stop = sl[sr[i]], off = so[i];
    result.push({ name: stop[0], lat: stop[1], lon: stop[2],
      arrival: _minToTime(depMin + off[0]),
      departure: _minToTime(depMin + off[1]) });
  }
  return result;
}
var _SVC_MAP = {'F':'Feriale','S':'Sabato','D':'Domenica'};
function _fmtServiceCompact(patterns) {
  var uniq = [];
  for (var pi = 0; pi < patterns.length; pi++) {
    var s = _SVC_MAP[patterns[pi].s] || patterns[pi].s;
    if (s && uniq.indexOf(s) === -1) uniq.push(s);
  }
  if (uniq.length === 0) return "";
  if (uniq.length === 1) return " · " + uniq[0];
  if (uniq.indexOf("Feriale") !== -1) return " · Feriale";
  return " · " + uniq.join(" e ");
}

function nativeSearchBusLine(query) {
  try {
    query = (query || "").trim().toUpperCase();
    if (query.length < 1) return;
    if (_busSearchTimer) { clearTimeout(_busSearchTimer); _busSearchTimer = null; }
    if (!_gtfsDB) {
      try { webkit.messageHandlers.requestGtfs.postMessage(""); } catch(e) {}
      appLog("⏳ GTFS DB non caricato, richiedo...");
      _busSearchTimer = setTimeout(function(){nativeSearchBusLine(query);},500);
      return;
    }
    var sl = _gtfsDB.sl, reqId = ++_busSearchReqId, results = [];
    var keys = Object.keys(_gtfsDB.lines);
    for (var ki = 0; ki < keys.length; ki++) {
      if (reqId !== _busSearchReqId) return;
      try {
        var ln = keys[ki];
        if (ln !== query && ln.indexOf(query+'_') !== 0) continue;
        var line = _gtfsDB.lines[ln];
        if (!line || !line.patterns || !line.patterns.length) continue;
        // Mostra TUTTI i pattern SEPARATAMENTE, con la lettera (rl)
        for (var pi = 0; pi < line.patterns.length; pi++) {
          if (reqId !== _busSearchReqId) return;
          try {
            var pat = line.patterns[pi];
            if (!pat || !pat.sr || !pat.sr.length) continue;
            var patLetter = pat.rl || "";
            var displayLine = ln + patLetter;  // "11", "11A", "11B", "11C"
            var fs = sl[pat.sr[0]];
            if (!fs) continue;
            results.push({
              displayName: "Linea " + displayLine,
              displaySubtitle: pat.h + " (" + pat.sr.length + " fermate)",
              name: ln, lat: fs[1], lon: fs[2], lineNumber: ln,
              direction: pat.d, stopCount: pat.sr.length,
              dist: distance(userLat, userLng, fs[1], fs[2]),
              _patIdx: pi
            });
          } catch(ee) {}
        }
      } catch(ee) { appLog("⚠️ Skipping " + keys[ki] + ": " + (ee.message||"")); }
    }
    if (reqId !== _busSearchReqId) return;
    results.sort(function(a,b){return a.dist-b.dist;});
    _lastSearchResults = results;
    try { webkit.messageHandlers.searchResults.postMessage(results); } catch(e) {}
    appLog("✅ Bus search '" + query + "': " + results.length + " risultati");
  } catch(e) { appLog("❌ nativeSearchBusLine error: " + e.message); }
}

function _lineShortName(name) {
  if (!name) return '';
  // Take last segment after ' - '
  var parts = name.split(' - ');
  var last = parts[parts.length-1].trim();
  // Remove parenthetical content
  last = last.replace(/\([^)]*\)/g, '').trim();
  // Remove trailing slash
  last = last.replace(/\/$/, '').trim();
  // If still long, take last segment after / or ,
  if (last.length > 20) {
    var sub = last.split('/');
    last = sub[sub.length-1].trim();
  }
  if (last.length > 20) {
    var sub = last.split(',');
    last = sub[sub.length-1].trim();
  }
  return last;
}

function nativeSearchBusLineByTime(query, seq, hour, min, day, month) {
  try {
    query = (query || "").trim().toUpperCase();
    if (query.length < 1) return;
    hour = parseInt(hour)||0; min = parseInt(min)||0; day = parseInt(day)||0; month = parseInt(month)||0;
    if (day < 1 || day > 31 || month < 1 || month > 12) return;
    
    // Costruisci data YYYYMMDD (usiamo 2026 come anno di riferimento — il GTFS e per il 2026)
    var dateStr = "2026" + (month<10?"0":"") + month + (day<10?"0":"") + day;
    var isFullDay = (hour === 0 && min === 0);
    
    if (_busSearchTimer) { clearTimeout(_busSearchTimer); _busSearchTimer = null; }
    if (!_gtfsDB) {
      try { webkit.messageHandlers.requestGtfs.postMessage(""); } catch(e) {}
      appLog("⏳ GTFS DB non caricato, richiedo...");
      _busSearchTimer = setTimeout(function(){nativeSearchBusLineByTime(query,seq,hour,min,day,month);},500);
      return;
    }
    
    // Calcola servizi attivi per questa data
    var activeServices = _getActiveServices(dateStr);
    appLog("🔍 Ricerca " + query + " @ " + dateStr + " (" + Object.keys(activeServices).length + " servizi attivi)");
    
    var sl = _gtfsDB.sl, reqId = ++_busSearchReqId, results = [];
    var keys = Object.keys(_gtfsDB.lines);
    for (var ki = 0; ki < keys.length; ki++) {
      if (reqId !== _busSearchReqId) return;
      try {
        var ln = keys[ki];
        var line = _gtfsDB.lines[ln];
        if (!line || !line.patterns || !line.patterns.length) continue;
        
        // Solo matching per numero linea (es. "93" trova linea 93)
        if (ln !== query) continue;
        
        // Nome giorno per etichetta
        var dayNames = ["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
        var dow = new Date(2026, month-1, day).getDay();
        var dayLabel = dayNames[dow];
        var serviceLabel = " · " + day + " " + _MONTH_NAMES[month-1] + " (" + dayLabel + ")";
        
        for (var pi = 0; pi < line.patterns.length; pi++) {
          if (reqId !== _busSearchReqId) return;
          try {
            var pat = line.patterns[pi];
            // Filtra per servizio attivo in questa data
            if (!activeServices[pat.svc]) continue;
            
            var depTimes = pat.t;
            for (var ti = 0; ti < depTimes.length; ti++) {
              if (reqId !== _busSearchReqId) return;
              try {
                var dep = depTimes[ti];
                if (!dep || dep.length < 5) continue;
                if (!isFullDay) {
                  var depTotal = _timeToMin(dep);
                  var startTotal = hour*60+min;
                  if (depTotal < startTotal || depTotal > startTotal+30) continue;
                }
                var fs = sl[pat.sr[0]];
                var patLetter = pat.rl || "";
                results.push({
                  displayName: dep + "  " + ln + patLetter + serviceLabel,
                  displaySubtitle: pat.h + " (" + pat.sr.length + " fermate)",
                  name: ln, lat: fs[1], lon: fs[2], lineNumber: ln,
                  direction: pat.d, departure: dep,
                  dirLabel: (pat.d===0?"Andata":"Ritorno"),
                  stopCount: pat.sr.length,
                  _patIdx: pi, _tripIdx: ti
                });
              } catch(ee) {}
            }
          } catch(ee) {}
        }
      } catch(ee) { appLog("⚠️ Skipping " + keys[ki] + ": " + (ee.message||"")); }
    }
    if (reqId !== _busSearchReqId) return;
    // Deduplica
    var seen = {};
    results = results.filter(function(r){var k=r.departure+'|'+(r.displaySubtitle||'');if(seen[k])return false;seen[k]=true;return true;});
    results.sort(function(a,b){return _timeToMin(a.departure)-_timeToMin(b.departure);});
    _lastSearchResults = results;
    try { webkit.messageHandlers.searchResults.postMessage({seq: seq, results: results}); } catch(e) {}
    appLog("✅ Bus search '" + query + "': " + results.length + " risultati" + (isFullDay?" (full day)":" @"+hour+":"+min+" +30min"));
  } catch(e) { appLog("❌ nativeSearchBusLineByTime error: " + e.message); }
}

function _getActiveServices(dateStr) {
  var active = {};
  var ca = _gtfsDB.ca;
  if (!ca) return active;
  var dateNum = parseInt(dateStr);
  for (var svcId in ca) {
    var c = ca[svcId];
    var start = parseInt(c[0]), end = parseInt(c[1]);
    if (dateNum < start || dateNum > end) continue;
    // Day of week: 0=Sun,1=Mon...6=Sat
    var y = parseInt(dateStr.substring(0,4)), m = parseInt(dateStr.substring(4,6))-1, d = parseInt(dateStr.substring(6,8));
    var dow = new Date(y, m, d).getDay();
    var dayIdx = (dow === 0) ? 6 : dow - 1; // mon=0, sun=6
    var dayPattern = c[2];
    if (dayPattern.charAt(dayIdx) !== '1') continue;
    // Check exceptions
    var isActive = true;
    var exc = c[3];
    for (var ei = 0; ei < exc.length; ei++) {
      if (exc[ei][0] === dateStr) {
        if (exc[ei][1] === '2') { isActive = false; break; }
      }
    }
    if (isActive) active[svcId] = true;
  }
  return active;
}

var _MONTH_NAMES = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];

// ===================================================================
// ROUTE SHAPE + CHUNK — OSRM Route con waypoint densi
// Waypoint ogni 10-20m = OSRM non puo prendere strade alternative
// Se troppi waypoint, splitta in chunk e concatena
// ===================================================================
function routeThroughStops(stops, shapeCoords, onComplete) {
  // Waypoints = shape TPER + fermate (tutti)
  var waypts = [];
  if (shapeCoords && shapeCoords.length >= 2) {
    // RDP downsample: rimuove punti ridondanti (epsilon=2m ≈ 0.000018 gradi)
    var downsampled = rdpSimplify(shapeCoords, 0.000018);
    for (var i = 0; i < downsampled.length; i++) waypts.push(downsampled[i][0] + "," + downsampled[i][1]);
    appLog("🛣️ Route FULL: " + shapeCoords.length + " shape pt -> RDP " + downsampled.length + " waypoint");
  } else if (stops && stops.length >= 2) {
    for (var i = 0; i < stops.length; i++) waypts.push(stops[i].lon + "," + stops[i].lat);
  } else {
    onComplete([]); return;
  }
  
  // Aggiungi fermate come waypoint extra se non gia presenti
  if (stops && stops.length >= 2) {
    var added = 0;
    for (var si = 0; si < stops.length; si++) {
      var key = stops[si].lon.toFixed(5) + "," + stops[si].lat.toFixed(5);
      var found = false;
      for (var wi = 0; wi < waypts.length; wi++) {
        if (waypts[wi].indexOf(key.substring(0, 12)) >= 0) { found = true; break; }
      }
      if (!found) { waypts.push(stops[si].lon + "," + stops[si].lat); added++; }
    }
    if (added > 0) appLog("   +" + added + " fermate extra");
  }
  
  appLog("   " + waypts.length + " waypoint totali");
  
  // Singolo chunk se <= 70 waypoint
  if (waypts.length <= 70) {
    return routeChunkFull(waypts, 0, onComplete);
  }
  
  // Multi chunk: 65 waypoint + 5 overlap
  var allCoords = [];
  var chunkSize = 65;
  var overlap = 5;
  var chunks = [];
  for (var ci = 0; ci < waypts.length; ci += chunkSize) {
    var end = Math.min(ci + chunkSize + overlap, waypts.length);
    chunks.push(waypts.slice(ci, end));
  }
  appLog("   " + chunks.length + " chunk da ~" + chunkSize);
  
  var chunkIdx = 0;
  function processChunk() {
    if (chunkIdx >= chunks.length) {
      appLog("✅ Route FULL: " + allCoords.length + " pt centrati");
      _snappedShape = allCoords.map(function(c) { return [c[1], c[0]]; });
      onComplete(allCoords);
      return;
    }
    routeChunkFull(chunks[chunkIdx], chunkIdx, function(coords) {
      if (coords && coords.length >= 2) {
        if (chunkIdx === 0) {
          // Primo chunk: tutti i punti
          for (var i = 0; i < coords.length; i++) allCoords.push(coords[i]);
          appLog("   Chunk " + (chunkIdx+1) + "/" + chunks.length + ": +" + coords.length + " pt. Primo: " + coords[0][0].toFixed(5)+","+coords[0][1].toFixed(5) + " Ultimo: " + coords[coords.length-1][0].toFixed(5)+","+coords[coords.length-1][1].toFixed(5));
        } else {
          // Chunk successivi: cerca il punto di chunk 2 PIU VICINO all'ultimo punto di chunk 1
          var lastPt = allCoords[allCoords.length - 1];
          var bestIdx = 0, bestDist = Infinity;
          for (var ci = 0; ci < Math.min(200, coords.length); ci++) {
            var dx = coords[ci][0] - lastPt[0];
            var dy = coords[ci][1] - lastPt[1];
            var d = dx*dx + dy*dy;
            if (d < bestDist) { bestDist = d; bestIdx = ci; }
          }
          var added = 0;
          for (var i = bestIdx + 1; i < coords.length; i++) { allCoords.push(coords[i]); added++; }
          appLog("   Chunk " + (chunkIdx+1) + "/" + chunks.length + ": +" + added + " pt (giunzione idx " + bestIdx + "). Primo agg: " + allCoords[allCoords.length-added][0].toFixed(5)+","+allCoords[allCoords.length-added][1].toFixed(5) + " Ultimo: " + coords[coords.length-1][0].toFixed(5)+","+coords[coords.length-1][1].toFixed(5));
        }
      } else {
        appLog("   ⚠️ Chunk " + (chunkIdx+1) + "/" + chunks.length + ": FALLITO");
      }
      chunkIdx++;
      setTimeout(processChunk, 400);
    });
  }
  processChunk();
}

function routeChunkFull(waypoints, idx, onComplete) {
  var url = OSRM_URL + "/route/v1/driving/" + waypoints.join(";") + "?geometries=geojson&overview=full&alternatives=false&steps=true";
  appLog("   Chunk " + (idx+1) + " " + waypoints.length + " waypoint -> Route FULL");
  var ctrl = new AbortController();
  var to = setTimeout(function(){ ctrl.abort(); }, 30000);
  fetch(url, {signal: ctrl.signal})
    .then(function(r) { return r.json(); })
    .then(function(data) {
      clearTimeout(to);
      if (data && data.routes && data.routes[0] && data.routes[0].geometry) {
        var rc = data.routes[0].geometry.coordinates;
        appLog("   ✅ Chunk " + (idx+1) + ": " + rc.length + " pt stradali. Primo: " + rc[0][0].toFixed(5)+","+rc[0][1].toFixed(5) + " Ultimo: " + rc[rc.length-1][0].toFixed(5)+","+rc[rc.length-1][1].toFixed(5));
        // Strade
        if (data.routes[0].legs && data.routes[0].legs.length > 0) {
          var stradaStr = "";
          for (var si = 0; si < data.routes[0].legs.length; si++) {
            var leg = data.routes[0].legs[si];
            if (leg.steps) {
              for (var sj = 0; sj < leg.steps.length; sj++) {
                var step = leg.steps[sj];
                if (step.name && step.name !== "") {
                  if (stradaStr.indexOf(step.name) === -1) stradaStr += (stradaStr?",":"") + step.name + "(" + Math.round(step.distance) + "m)";
                }
              }
            }
          }
          if (stradaStr) appLog("   🛣️ Strade: " + stradaStr);
        }
        onComplete(rc);
      } else {
        throw data && data.message ? data.message : "no route";
      }
    })
    .catch(function(err) {
      clearTimeout(to);
      appLog("⚠️ Route full chunk " + (idx+1) + " error: " + (err.message||err));
      // Fallback: usa waypoints raw come linea retta
      var raw = waypoints.map(function(w){ var p = w.split(","); return [parseFloat(p[0]), parseFloat(p[1])]; });
      onComplete(raw);
    });
}

// ===================================================================
// OSRM Match — snap shape TPER alla strada (traccia GPS → percorso stradale)
// ===================================================================
function matchShapeToRoad(shapeCoords, onComplete) {
  var total = shapeCoords.length;
  appLog("📍 Match: " + total + " pt shape -> OSRM Match (traccia GPS)");
  
  var allCoords = [];
  var chunkSize = 75; // max ~90 per chunk per limite OSRM
  
  if (total <= chunkSize) {
    return matchChunk(shapeCoords, onComplete);
  }
  
  var chunks = [];
  for (var ci = 0; ci < total; ci += chunkSize) {
    var end = Math.min(ci + chunkSize + 2, total);
    chunks.push(shapeCoords.slice(ci, end));
  }
  appLog("   " + chunks.length + " chunk da ~" + chunkSize + " pt");
  
  var chunkIdx = 0;
  function processChunk() {
    if (chunkIdx >= chunks.length) {
      appLog("✅ Match OK: " + allCoords.length + " pt stradali centrati");
      onComplete(allCoords);
      return;
    }
    matchChunk(chunks[chunkIdx], function(coords) {
      if (coords && coords.length >= 2) {
        var start = (chunkIdx === 0) ? 0 : 1;
        for (var i = start; i < coords.length; i++) allCoords.push(coords[i]);
        appLog("   Chunk " + (chunkIdx+1) + "/" + chunks.length + ": +" + (coords.length-start) + " pt");
      } else {
        // Fallback: usa punti raw se Match fallisce
        var raw = chunks[chunkIdx];
        var start = (chunkIdx === 0) ? 0 : 1;
        for (var i = start; i < raw.length; i++) allCoords.push(raw[i]);
        appLog("   ⚠️ Chunk " + (chunkIdx+1) + "/" + chunks.length + ": fallback raw, +" + (raw.length-start) + " pt");
      }
      chunkIdx++;
      setTimeout(processChunk, 500);
    });
  }
  processChunk();
}

function matchChunk(coords, onComplete) {
  // coords is [lon, lat] format
  var waypoints = coords.map(function(p){ return p[0] + "," + p[1]; }).join(";");
  var radiuses = coords.map(function(){ return "5"; }).join(";"); // radius=5m per ogni punto
  var url = OSRM_URL + "/match/v1/driving/" + waypoints + "?geometries=geojson&overview=full&radiuses=" + radiuses + "&steps=true";
  
  appLog("   Match URL: " + coords.length + " waypoint, radius=5m, no tidy");
  var ctrl = new AbortController();
  var to = setTimeout(function(){ ctrl.abort(); }, 30000);
  
  fetch(url, {signal: ctrl.signal})
    .then(function(r) { return r.json(); })
    .then(function(data) {
      clearTimeout(to);
      if (data && data.matchings && data.matchings[0] && data.matchings[0].geometry) {
        var rc = data.matchings[0].geometry.coordinates;
        appLog("   ✅ Match: " + rc.length + " pt stradali. Primo: " + rc[0][0].toFixed(5)+","+rc[0][1].toFixed(5) + " Ultimo: " + rc[rc.length-1][0].toFixed(5)+","+rc[rc.length-1][1].toFixed(5));
        // Estrai strade per barra via
        var stradaStr = "";
        if (data.matchings[0].legs) {
          for (var si = 0; si < data.matchings[0].legs.length; si++) {
            var leg = data.matchings[0].legs[si];
            if (leg.steps) {
              for (var sj = 0; sj < leg.steps.length; sj++) {
                var step = leg.steps[sj];
                if (step.name && step.name !== "" && stradaStr.indexOf(step.name) === -1) {
                  stradaStr += (stradaStr?",":"") + step.name;
                }
              }
            }
          }
        }
        if (stradaStr) appLog("   🛣️ Strade: " + stradaStr);
        onComplete(rc);
      } else {
        appLog("⚠️ Match no risultato per chunk " + coords.length + " pt");
        onComplete(null);
      }
    })
    .catch(function(err) {
      clearTimeout(to);
      appLog("⚠️ Match error: " + (err.message||err));
      onComplete(null);
    });
}

// ===================================================================
// OSRM Nearest — snap OGNI punto sulla strada (parallelo, batch da 5)
// ===================================================================
function nearestPointOnLine(lineCoords, pt) {
  var bestDist = Infinity, bestPt = pt;
  for (var i = 0; i < lineCoords.length - 1; i++) {
    var a = lineCoords[i], b = lineCoords[i+1];
    var dx = b[0] - a[0], dy = b[1] - a[1];
    var lenSq = dx*dx + dy*dy;
    if (lenSq < 0.00000001) continue;
    var t = Math.max(0, Math.min(1, ((pt[0]-a[0])*dx + (pt[1]-a[1])*dy) / lenSq));
    var cx = a[0] + t*dx, cy = a[1] + t*dy;
    var d = Math.sqrt((pt[0]-cx)*(pt[0]-cx) + (pt[1]-cy)*(pt[1]-cy));
    if (d < bestDist) { bestDist = d; bestPt = [cx, cy]; }
  }
  return bestPt;
}

// SNAP LOCALE via MapLibre road data — INSTANT, zero network
function snapShapeLocal(shapeCoords, onComplete) {
  var total = shapeCoords.length;
  var snapped = new Array(total);
  
  for (var i = 0; i < total; i++) {
    (function(idx) {
      var pt = shapeCoords[idx];
      var px = map.project([pt[0], pt[1]]);
      // BBox largo 200px per catturare strade anche a zoom bassi
      var features = map.queryRenderedFeatures([[px.x-100, px.y-100], [px.x+100, px.y+100]]);
      var bestDist = Infinity, bestPt = pt;
      for (var fi = 0; fi < features.length; fi++) {
        var f = features[fi];
        if (!f || !f.geometry) continue;
        var geo = f.geometry;
        // Salta feature non-strada (acqua, parchi, edifici, ecc)
        var layer = f.layer ? f.layer.id || '' : '';
        if (layer.indexOf('water') >= 0 || layer.indexOf('building') >= 0 || layer.indexOf('park') >= 0 || layer.indexOf('wood') >= 0 || layer.indexOf('grass') >= 0 || layer.indexOf('pitch') >= 0) continue;
        if (geo.type === 'LineString') {
          var sp = nearestPointOnLine(geo.coordinates, pt);
          var d = Math.sqrt((pt[0]-sp[0])*(pt[0]-sp[0])+(pt[1]-sp[1])*(pt[1]-sp[1]));
          if (d < bestDist) { bestDist = d; bestPt = sp; }
        } else if (geo.type === 'MultiLineString') {
          for (var j = 0; j < geo.coordinates.length; j++) {
            var sp = nearestPointOnLine(geo.coordinates[j], pt);
            var d = Math.sqrt((pt[0]-sp[0])*(pt[0]-sp[0])+(pt[1]-sp[1])*(pt[1]-sp[1]));
            if (d < bestDist) { bestDist = d; bestPt = sp; }
          }
        }
      }
      snapped[idx] = bestPt;
    })(i);
  }
  // Filtra eventuali undefined
  var result = [];
  for (var j = 0; j < snapped.length; j++) {
    if (snapped[j]) result.push(snapped[j]); 
    else result.push(shapeCoords[j]);
  }
  appLog("📍 Snap locale: " + result.length + " pt centrati (0 network)");
  onComplete(result);
}

// ===================================================================
// Median filter — rimuove wobble preservando curve
// ===================================================================
function medianFilter(coords, windowSize) {
  if (!coords || coords.length < 3) return coords;
  var result = [];
  var w = Math.max(1, Math.min(windowSize, Math.floor((coords.length-1)/2)));
  for (var i = 0; i < coords.length; i++) {
    var start = Math.max(0, i - w);
    var end = Math.min(coords.length - 1, i + w);
    var sumLng = 0, sumLat = 0, count = 0;
    for (var j = start; j <= end; j++) {
      sumLng += coords[j][0];
      sumLat += coords[j][1];
      count++;
    }
    result.push([sumLng/count, sumLat/count]);
  }
  return result;
}

// Ramer-Douglas-Peucker (epsilon in gradi)
function rdpSimplify(coords, eps) {
  if (coords.length <= 2) return coords;
  var first = coords[0], last = coords[coords.length - 1];
  var maxDist = 0, maxIdx = 0;
  for (var i = 1; i < coords.length - 1; i++) {
    var d = pointLineDist(coords[i], first, last);
    if (d > maxDist) { maxDist = d; maxIdx = i; }
  }
  if (maxDist > eps) {
    var left = rdpSimplify(coords.slice(0, maxIdx + 1), eps);
    var right = rdpSimplify(coords.slice(maxIdx), eps);
    return left.slice(0, -1).concat(right);
  }
  return [first, last];
}

function pointLineDist(p, a, b) {
  var dx = b[0] - a[0], dy = b[1] - a[1];
  var len = Math.sqrt(dx*dx + dy*dy);
  if (len < 0.000001) return Math.sqrt((p[0]-a[0])*(p[0]-a[0]) + (p[1]-a[1])*(p[1]-a[1]));
  var t = Math.max(0, Math.min(1, ((p[0]-a[0])*dx + (p[1]-a[1])*dy) / (len*len)));
  var cx = a[0] + t*dx, cy = a[1] + t*dy;
  return Math.sqrt((p[0]-cx)*(p[0]-cx) + (p[1]-cy)*(p[1]-cy));
}

function selectBusLine(lineNum, dir, patIdx, tripIdx) {
  appLog("🗺️ selectBusLine(" + lineNum + "," + dir + "," + patIdx + "," + tripIdx + ")");
  clearRoute(); clearDestination(); clearBusRouteLayers();
  _snappedShape = null; // clear stale snapped data
  if (!_gtfsDB) {
    try { webkit.messageHandlers.requestGtfs.postMessage(""); } catch(e) {}
    setTimeout(function(){selectBusLine(lineNum,dir);},500);
    return;
  }
  var sl = _gtfsDB.sl, sh = _gtfsDB.sh;
  var line = _gtfsDB.lines[lineNum];
  if (!line || !line.patterns) { appLog("❌ line '" + lineNum + "' not found"); return; }
  
  // Trova pattern per la direzione SELEZIONATA
  var pat = null;
  if (patIdx !== undefined && patIdx !== null && line.patterns[patIdx] && line.patterns[patIdx].d === dir) {
    pat = line.patterns[patIdx];
  } else {
    for (var i = 0; i < line.patterns.length; i++) { if (line.patterns[i].d === dir) { pat = line.patterns[i]; break; } }
  }
  if (!pat) { appLog("❌ no pattern for dir " + dir); return; }
  
  var tIdx = (tripIdx !== undefined && tripIdx !== null && tripIdx < pat.t.length) ? tripIdx : 0;
  var depTime = pat.t[tIdx];
  var tripStops = _patternStops(sl, pat.sr, pat.so, depTime);
  
  // Salva returnStops per navigazione (non disegnare)
  var returnPat = null;
  for (var i = 0; i < line.patterns.length; i++) { if (line.patterns[i].d !== dir) { returnPat = line.patterns[i]; break; } }
  var returnStops = returnPat ? _patternStops(sl, returnPat.sr, returnPat.so, returnPat.t[0]) : null;
  
  var routeColor = (dir === 0) ? '#22cc44' : '#cc2222';
  var routeWidth = (dir === 0) ? 6 : 4;
  
  var trip = {
    dir: pat.d, headsign: pat.h, service: pat.svc || "",
    departure: depTime, stops: tripStops,
    shape: sh[pat.sh] || [],
    lat: tripStops[0].lat, lon: tripStops[0].lon, stopCount: tripStops.length
  };
  appLog("✅ " + (dir===0?"Andata":"Ritorno") + ": stops=" + tripStops.length + ", dep=" + depTime + ", color=" + routeColor);
  stopNavEngine();
  
  // Usa la shape GTFS TPER (percorso REALE del bus) invece di linee rette tra fermate
  // La shape e in formato [[lat,lon],...], va convertita in [lon,lat] per MapLibre
  var shapeCoords = (sh[pat.sh] || []).map(function(p){return [p[1], p[0]];});
  var coords = (shapeCoords.length >= 2) ? shapeCoords : tripStops.map(function(s){return [s.lon, s.lat];});
  var drawOk = false;
  try {
    // Rimuovi SOLO i layer vecchi (NON bus-route-v2 che non usiamo piu per doppio percorso)
    ['route-line','route-line-v2','bus-route','bus-route-v1','bus-route-v2'].forEach(function(id){try{map.removeLayer(id);}catch(e){}try{map.removeSource(id);}catch(e){}});
    // Layer UNICO: colore = verde per Andata, rosso per Ritorno
    map.addSource('bus-route-v1',{type:'geojson',data:{type:'Feature',geometry:{type:'LineString',coordinates:coords}}});
    map.addLayer({id:'bus-route-v1',type:'line',source:'bus-route-v1',layout:{'line-join':'round','line-cap':'round'},paint:{'line-color':routeColor,'line-width':8,'line-opacity':1.0}});
    try{map.moveLayer('user-location-layer');}catch(ee){}
    try{map.moveLayer('user-location-ring');}catch(ee){}
    var lastC = coords[coords.length-1];
    try{if(markerDest){markerDest.remove();markerDest=null;}}catch(e){}
    var el=document.createElement('div'); el.style.cssText="width:16px;height:16px;border-radius:50%;background:#e74c3c;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5)";
    markerDest=new maplibregl.Marker({element:el,anchor:'center'}).setLngLat(lastC).addTo(map);
    try{var b=new maplibregl.LngLatBounds();coords.forEach(function(c){b.extend(c);});var c=b.getCenter();map.jumpTo({center:[c.lng,c.lat],zoom:11,pitch:0});}catch(e){}
    drawOk=true;
  } catch(e){appLog("❌ bus-route: "+e.message);}
  
  if(drawOk){
    _clearBusStopMarkers();
    // Marker fermate: colore corrisponde alla direzione
    var stopColor = (dir === 0) ? '#22cc44' : '#cc2222';
    var firstLastColor = (dir === 0) ? '#e74c3c' : '#e74c3c'; // capolinea sempre rossi
    tripStops.forEach(function(s,idx){
      var el=document.createElement('div');
      var style="width:14px;height:14px;border-radius:50%;background:"+stopColor+";border:2px solid #fff;cursor:pointer;";
      if(idx===0||idx===tripStops.length-1) style="width:18px;height:18px;border-radius:50%;background:#e74c3c;border:3px solid #fff;cursor:pointer;";
      el.style.cssText=style; el.title=s.name;
      var popup = s.name + "<br/>arrivo: " + s.arrival + " - partenza: " + s.departure;
      var m=new maplibregl.Marker({element:el,anchor:'center'}).setLngLat([s.lon,s.lat]).setPopup(new maplibregl.Popup({offset:10}).setHTML(popup)).addTo(map);
      _busStopMarkerList.push(m);
    });
    
    _busNavData={line:lineNum,dir:dir,trip:trip,returnStops:returnStops};
    
    // OSRM route (sempre sulla direzione selezionata)
    var wps=tripStops.map(function(s){return s.lon+","+s.lat;}).join(";");
    var url=OSRM_URL+"/route/v1/driving/"+wps+"?geometries=geojson&overview=full&alternatives=false";
    var ctrl=new AbortController(); var to=setTimeout(function(){ctrl.abort();},10000);
    fetch(url,{signal:ctrl.signal}).then(function(r){return r.json();}).then(function(data){
      clearTimeout(to);
      if(data&&data.routes&&data.routes[0]){
        var rc=data.routes[0].geometry.coordinates;
        // NON sovrascrivere bus-route-v1 — la shape TPER e il percorso VISIBILE
        try{if(markerDest)markerDest.setLngLat(rc[rc.length-1]);}catch(ee){}
        _busOsrmCoords=rc;
        // Estrai nomi strade OSRM per la barra via in basso
        _routeSteps = [];
        var cumDist = 0;
        if (data.routes[0].legs && data.routes[0].legs[0] && data.routes[0].legs[0].steps) {
          for (var si = 0; si < data.routes[0].legs[0].steps.length; si++) {
            var step = data.routes[0].legs[0].steps[si];
            cumDist += step.distance || 0;
            _routeSteps.push({name: step.name || "", cumDist: cumDist});
          }
        } else {
          _routeSteps = [{name: "", cumDist: rc.length}];
        }
      } else { _busOsrmCoords=null; }
    }).catch(function(err){clearTimeout(to);_busOsrmCoords=null;});
    
    // OSRM Nearest — OGNI punto snapato sulla strada
    var firstShape = shapeCoords[0], lastShape = shapeCoords[shapeCoords.length-1];
    appLog("📌 Shape: " + shapeCoords.length + " pt, " + firstShape[0].toFixed(5)+","+firstShape[1].toFixed(5) + " → " + lastShape[0].toFixed(5)+","+lastShape[1].toFixed(5));
    
    if (shapeCoords && shapeCoords.length >= 2) {
      snapShapeNearest(shapeCoords, function(snapped) {
        if (snapped && snapped.length >= 2) {
          try {
            var filtered = medianFilter(snapped, 7);
            map.getSource('bus-route-v1').setData({type:'Feature',geometry:{type:'LineString',coordinates:filtered}});
            appLog("✅ OSRM Nearest+Med7: " + snapped.length + "→" + filtered.length + " pt");
          } catch(e) { appLog("⚠️ Nearest/Med: " + e.message); }
        } else { appLog("⚠️ Nearest fallita"); }
      });
    }
    
    setTimeout(function(){pushPosition(userLat,userLng,userCourse||0,performance.now());try{webkit.messageHandlers.routeReady.postMessage("ok");}catch(e){}},500);
  } else {
    appLog("❌ selectBusLine: drawing failed");
  }
}

function startBusNavigation(dirOverride) {
  appLog("▶️ Bus navigation start" + (dirOverride ? " (" + dirOverride + ")" : ""));
  var busData = _busNavData;
  if (!busData || !busData.trip) {
    appLog("⚠️ No bus data for navigation");
    return;
  }
  var trip = busData.trip;
  // RITORNO = stesse fermate invertite (stessi capolinea, percorso opposto)
  var returnStops = (dirOverride === 'ritorno') ? busData.returnStops : null;
  if (returnStops) {
    appLog("🔄 Navigazione RITORNO: " + returnStops.length + " fermate (TPER returnTrip)");
  }
  var firstStop = returnStops ? returnStops[0] : trip.stops[0];
  var lastStop = returnStops ? returnStops[returnStops.length - 1] : trip.stops[trip.stops.length - 1];
  
  // Use OSRM through all stops (strade vere) instead of raw GTFS shape
  var osrmCoords = returnStops ? _busOsrmCoordsReturn : _busOsrmCoords;
  if (osrmCoords && osrmCoords.length >= 2) {
    appLog("✅ Using pre-fetched OSRM route (" + osrmCoords.length + " pt)");
    // Just need user→firstStop, then combine
    var osrmUrl = OSRM_URL + "/route/v1/driving/"
      + userLng + "," + userLat + ";"
      + firstStop.lon + "," + firstStop.lat
      + "?geometries=geojson&overview=full";
    
    fetch(osrmUrl)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var userCoords = (data && data.routes && data.routes[0]) ? data.routes[0].geometry.coordinates : [];
        var combined = userCoords.concat(osrmCoords);
        appLog("✅ Combined: user " + userCoords.length + " + OSRM stops " + osrmCoords.length + " = " + combined.length + " pt");
        startBusNavWithCoords(combined, busData, lastStop);
      })
      .catch(function(err) {
        appLog("⚠️ User→stop OSRM error: " + (err.message||err) + ", using stops route only");
        startBusNavWithCoords(osrmCoords, busData, lastStop);
      });
  } else {
    // Fetch OSRM through all stops now (waypoints: user + stops)
    var navStops = returnStops || trip.stops;
    var waypoints = [userLng + "," + userLat];
    for (var i = 0; i < navStops.length; i++) {
      waypoints.push(navStops[i].lon + "," + navStops[i].lat);
    }
    var osrmUrl = OSRM_URL + "/route/v1/driving/" + waypoints.join(";") + "?geometries=geojson&overview=full&alternatives=false";
    appLog("🧭 Bus OSRM through " + navStops.length + " stops (" + waypoints.length + " waypoints)");
    
    var controller = new AbortController();
    var timeoutId = setTimeout(function() { controller.abort(); }, 15000);
    
    fetch(osrmUrl, {signal: controller.signal})
      .then(function(r) { return r.json(); })
      .then(function(data) {
        clearTimeout(timeoutId);
        if (data && data.routes && data.routes[0]) {
          var combined = data.routes[0].geometry.coordinates;
          appLog("✅ OSRM full route: " + combined.length + " pt");
          startBusNavWithCoords(combined, busData, lastStop);
        } else {
          throw "no route";
        }
      })
      .catch(function(err) {
        clearTimeout(timeoutId);
        appLog("⚠️ Full OSRM failed: " + (err.message||err) + ", using raw shape fallback");
        // Fallback: raw shape (invertita per ritorno)
        var busCoords = trip.shape.map(function(p) { return [p[1], p[0]]; });
        if (returnStops) { busCoords = busCoords.slice().reverse(); }
        startBusNavWithCoords(busCoords, busData, lastStop);
      });
  }
}

function startBusNavWithCoords(combined, busData, lastStop) {
  // Set navigation state
  navRoute = { type: 'LineString', coordinates: combined };
  navCoords = combined.slice();
  
  // NON aggiornare bus-route-v1 — la shape TPER rimane il percorso VISIBILE
  
  _totalRouteDist = 0;
  for (var j = 1; j < combined.length; j++) {
    _totalRouteDist += distance(combined[j-1][1], combined[j-1][0], combined[j][1], combined[j][0]);
  }
  navDistance = _totalRouteDist;
  // Preserva _routeSteps da OSRM (gia popolato in selectBusLine con nomi strade)
  // Se gia popolato (da OSRM), mantieni. Altrimenti usa fallback vuoto.
  if (!_routeSteps || _routeSteps.length === 0 || _routeSteps[0].name === "") {
    _routeSteps = [{name: "", cumDist: _totalRouteDist}];
  }
  _navCoordOffset = 0;
  _destLat = lastStop.lat;
  _destLon = lastStop.lon;
  _destName = "Linea " + busData.line + " - " + lastStop.name;
  
  // Send sim coords — USA LA SHAPE TPER (non OSRM) per far coincidere freccia col percorso visibile
  try {
    var simArr = [];
    // User position + shape coordinates (snappata su strada se disponibile)
    var trip = busData.trip;
    var shapeArr = _snappedShape || (trip && trip.shape) || [];
    if (shapeArr.length >= 2) {
      // Start from user position, then follow TPER shape (snappata)
      simArr.push({lat: userLat, lon: userLng});
      for (var si = 0; si < shapeArr.length; si++) {
        simArr.push({lat: shapeArr[si][0], lon: shapeArr[si][1]});
      }
    } else {
      // Fallback: use OSRM combined (se shape TPER non disponibile)
      for (var si = 0; si < combined.length; si++) {
        simArr.push({lat: combined[si][1], lon: combined[si][0]});
      }
    }
    webkit.messageHandlers.simCoords.postMessage(JSON.stringify(simArr));
  } catch(e) {}
  
  // Start navigation
  appLog("▶️ Starting bus navigation...");
  navETA = _totalRouteDist / 13.9;
  isNavigating = true;
  hasGps = true;
  // Push posizione corrente 2x per avere buffer >= 2 per interpolazione immediata
  var now = performance.now();
  _navEnginePending.push({lat: userLat, lng: userLng, bearing: userCourse || 0, ts: now - 50});
  _navEnginePending.push({lat: userLat, lng: userLng, bearing: userCourse || 0, ts: now});
  if (navTimer) clearInterval(navTimer);
  navTimer = setInterval(function() { navTick(); }, 1000);
  startNavEngine();
  
  // Notifica ObjC
  try { webkit.messageHandlers.navigationStart.postMessage(JSON.stringify({
    distance: _totalRouteDist,
    eta: _totalRouteDist / 13.9,
    name: _destName
  })); } catch(e) {}
  
  // Forza push posizione tra 500ms, 1s e 2s per assicurarsi buffer pieno
  // (in caso GPS non arrivi subito da ObjC)
  var _pushCount = 0;
  var _pushTimer = setInterval(function() {
    _pushCount++;
    appLog("⏱️ Nav push forced #" + _pushCount + " pos=" + userLat.toFixed(4) + "," + userLng.toFixed(4));
    pushPosition(userLat, userLng, userCourse || 0, performance.now());
    if (_pushCount >= 10) clearInterval(_pushTimer); // dopo 10 push (5s), ferma
  }, 500);
}

// ---- BUS STOPS ----
function busStopsFromJSON(jsonStr) {
  try {
    var stops = JSON.parse(jsonStr);
    if (window._busStopMarkers) {
      window._busStopMarkers.forEach(function(m) { m.remove(); });
    }
    window._busStopMarkers = [];
    
    stops.forEach(function(s) {
      var lat = (s.lat !== undefined) ? parseFloat(s.lat) : (s.center && s.center.lat !== undefined ? parseFloat(s.center.lat) : null);
      var lon = (s.lon !== undefined) ? parseFloat(s.lon) : (s.center && s.center.lon !== undefined ? parseFloat(s.center.lon) : null);
      if (lat === null || lon === null || isNaN(lat) || isNaN(lon)) return;
      
      var el = document.createElement("div");
      el.style.cssText = "width:12px;height:12px;border-radius:50%;background:#f39c12;border:2px solid #fff";
      var m = new maplibregl.Marker({element:el,anchor:"center"})
        .setLngLat([lon, lat])
        .addTo(map);
      window._busStopMarkers.push(m);
    });
    return window._busStopMarkers.length;
  } catch(e) {
    console.error("busStopsFromJSON error:", e);
    return 0;
  }
}

function busStopsSetVisible(visible) {
  if (window._busStopMarkers) {
    window._busStopMarkers.forEach(function(m) {
      m.getElement().style.display = visible ? "block" : "none";
    });
  }
}

// ===================================================================
// HELPERS
// ===================================================================
function distance(lat1, lng1, lat2, lng2) {
  var R = 6371000;
  var dLat = (lat2-lat1)*Math.PI/180;
  var dLng = (lng2-lng1)*Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function bearing(lat1, lng1, lat2, lng2) {
  var dL = (lng2-lng1)*Math.PI/180;
  var y = Math.sin(dL)*Math.cos(lat2*Math.PI/180);
  var x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) - Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dL);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}

// Ottiene nome via dalla mappa (queryRenderedFeatures, offline) — chiamato da busSimTick

var _lastBrightness = 1.0;

function setMapBrightness(val) {
  var bright = 1.0 - val * 0.95;

  if (_isDark) {
    document.getElementById("map").style.filter = "brightness(" + (bright*0.7) + ") invert(0.9) hue-rotate(180deg)";

// Ricrea icona freccia canvas dopo rotazione (WKWebView perde il WebGL context)
function reinitArrowIcon() {
  try {
    if (!map) return;
    try { map.removeImage('nav-arrow-icon'); } catch(e) {}
    var c = document.createElement('canvas');
    c.width = 36; c.height = 36;
    var ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 36, 36);
    ctx.fillStyle = '#4488ff';
    ctx.beginPath();
    ctx.moveTo(18, 2); ctx.lineTo(30, 30); ctx.lineTo(18, 24); ctx.lineTo(6, 30); ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(18, 15, 5, 0, 2*Math.PI); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1; ctx.stroke();
    map.addImage('nav-arrow-icon', ctx.getImageData(0, 0, 36, 36));
    appLog("✅ Freccia ricreata dopo rotazione");
  } catch(e) { appLog("reinitArrowIcon err: " + (e.message||e)); }
}

// Forza ri-centro camera con offset dopo rotazione (chiamata da ObjC)
function recenterCamera(lat, lng, bearing, zoom, pitch, offMeters, vertOffMeters) {
  try {
    if (!map) return;
    // Calcola offset
    var bearingRad = bearing * Math.PI / 180.0;
    var latPerMeter = 1.0 / 111320.0;
    var lonPerMeter = 1.0 / (111320.0 * Math.cos(lat * Math.PI / 180.0));
    var offLat = offMeters * Math.cos(bearingRad + Math.PI/2) * latPerMeter
              + vertOffMeters * Math.cos(bearingRad) * latPerMeter;
    var offLng = offMeters * Math.sin(bearingRad + Math.PI/2) * lonPerMeter
              + vertOffMeters * Math.sin(bearingRad) * lonPerMeter;
    // Svuota buffer e pusha posizione corrente 2x (serve >=2 per rAF)
    _navEnginePending = [];
    var now = performance.now();
    _navEnginePending.push({lat: lat, lng: lng, bearing: bearing, ts: now - 50});
    _navEnginePending.push({lat: lat, lng: lng, bearing: bearing, ts: now});
    // Aggiorna freccia SUBITO
    try {
      if (_navEngineSource) {
        _navEngineSource.setData({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [lng, lat] },
          properties: { bearing: bearing }
        });
      }
    } catch(e) {}
    // jumpTo istantaneo con offset (NON easeTo — evita conflitto col rAF engine)
    map.jumpTo({
      center: [lng + offLng, lat + offLat],
      bearing: bearing,
      zoom: zoom,
      pitch: pitch
    });
    appLog("🔄 Camera recentered after rotation");
  } catch(e) { appLog("recenterCamera err: " + (e.message||e)); }
}

// Restituisce info testuali per i pulsanti ANDATA/RITORNO
function getBusRouteInfo() {
  if (!_busNavData || !_busNavData.trip) return JSON.stringify({andata: "", ritorno: ""});
  var dir = _busNavData.dir;
  var trip = _busNavData.trip;
  var firstStop = trip.stops[0];
  var lastStop = trip.stops[trip.stops.length - 1];
  var selectedRoute = (firstStop ? firstStop.name : "?") + " → " + (lastStop ? lastStop.name : "?");
  var oppositeRoute = "";
  if (_busNavData.returnStops && _busNavData.returnStops.length >= 2) {
    var rFirst = _busNavData.returnStops[0];
    var rLast = _busNavData.returnStops[_busNavData.returnStops.length - 1];
    oppositeRoute = (rFirst ? rFirst.name : "?") + " → " + (rLast ? rLast.name : "?");
  }
  // andata = sempre dir0, ritorno = sempre dir1
  if (dir === 0) {
    return JSON.stringify({andata: selectedRoute, ritorno: oppositeRoute});
  } else {
    return JSON.stringify({andata: oppositeRoute, ritorno: selectedRoute});
  }
}

// ===================================================================
// getStreetNameFromRoute — ritorna il nome via dal percorso OSRM
// Non modifica navCoords, non triggera arrivo. SOLO lettura.
// ===================================================================
function getStreetNameFromRoute(lat, lng) {
  if (!navCoords || navCoords.length < 2 || !_routeSteps || _routeSteps.length === 0) return "";
  try {
    var closest = 0, minDist = Infinity;
    for (var i = 0; i < navCoords.length; i++) {
      var d = distance(lat, lng, navCoords[i][1], navCoords[i][0]);
      if (d < minDist) { minDist = d; closest = i; }
    }
    // Distanza percorsa dall'inizio fino al punto più vicino
    var traveled = 0;
    for (var j = 1; j <= closest; j++) {
      traveled += distance(navCoords[j-1][1], navCoords[j-1][0], navCoords[j][1], navCoords[j][0]);
    }
    // Aggiunge un po' di anticipo per transizione fluida tra le vie
    if (closest < navCoords.length - 1) {
      traveled += distance(navCoords[closest][1], navCoords[closest][0], navCoords[closest+1][1], navCoords[closest+1][0]) * 0.3;
    }
    return getCurrentStreetName(traveled);
  } catch(e) {
    appLog("getStreetNameFromRoute err: " + (e.message || e));
    return "";
  }
}

// ===================================================================
// getRoadName — ritorna il nome della strada a date coordinate
// Scansiona TUTTI i layer fino a trovare un feature con name
// ===================================================================
function getRoadName(lat, lng) {
  try {
    var px = map.project([lng, lat]);
    var bbox = [[px.x - 8, px.y - 8], [px.x + 8, px.y + 8]];
    // queryRenderedFeatures su TUTTI i layer — cerca qualunque feature con name
    var all = map.queryRenderedFeatures(bbox);
    // Prima passa: cerca strade (class ~ road-like o highway)
    for (var i = 0; i < all.length; i++) {
      var p = all[i].properties;
      if (!p || !p.name) continue;
      var cls = (p.class || p._class || "").toLowerCase();
      if (cls === 'ferry' || cls === 'path' || cls === 'footway' || cls === 'cycleway') continue;
      if (p.name.length > 1) return p.name;
    }
    // Secondo passa: qualunque feature con name (incluso pedestrian, piazza, etc.)
    for (var i = 0; i < all.length; i++) {
      var p = all[i].properties;
      if (p && p.name && p.name.length > 1) return p.name;
    }
  } catch(e) {
    appLog("getRoadName err: " + (e.message || e));
  }
  return "";
}
